# example module i18n batch(58 templates) — 2026.07.01
i1.1=User Guide · Implementation Guide
i1.2=This page explains ① how to use the example catalog <strong>without logging in</strong>, and ② how to implement <strong>modules that require external infrastructure (mail·SMS·OAuth) or a preceding batch aggregation</strong> to work.
i1.3=Catalog Usage Guide
i1.4=<b>No login required</b> — The catalog and all example screens can be used immediately without logging in. On visit, a demo administrator (admin) session is <em>applied automatically</em>, so admin screens requiring privileges (codes·menus·permissions·batch, etc.) also open as-is.
i1.5=<b>Real behavior</b> — Clicking each card navigates to an actual screen connected to an in-memory HSQL DB. List·search·paging·detail all work.
i1.6=<b>Standardization rules</b> — All tables are standardized with a <code>TB_</code> prefix + upper snake case + audit columns (FRST_REGIST_PNTTM, etc.), and mappers are provided for 7 DBMS (HSQL/PostgreSQL/MySQL/Oracle/Tibero/CUBRID/Altibase).
i1.7=<b>Direct login</b> is also possible — Logging in with <code>admin / 1</code> on the top Login screen lets you check the login flow itself as an example.
i1.8=Modules requiring external infrastructure
i1.9=External integration
i1.10=Mail sending (cop/ems)
i1.11=An external SMTP mail server is required for actual sending.
i1.12=① Add the <b>spring-boot-starter-mail</b> dependency → ② Set <code>spring.mail.host/port/username/password</code> in <code>application.yml</code> (internal mail relay or SMTP provider) → ③ Inject the <b>JavaMailSender</b> bean and send via <code>MimeMessage</code> → ④ Record results in the send-history table.
i1.13=Requirements: production SMTP account · SPF/DKIM settings for the sending domain
i1.14=SMS/MMS sending (cop/sms)
i1.15=A sending gateway API from a carrier/messaging provider is required.
i1.16=① After signing up with a messaging provider (e.g. NHN Cloud·Aligo·AWS SNS), <b>pre-register the API key·sender number</b> → ② Send requests via a REST client → ③ Receive·store the send-result callback (Webhook).
i1.17=Requirements: sender number pre-registration (Telecommunications Business Act), API auth key
i1.18=Social login (ext/oauth)
i1.19=Registration with OAuth2 providers such as Google·Naver·Kakao is required.
i1.20=① Add <b>spring-boot-starter-oauth2-client</b> → ② Issue <b>clientId·secret·redirect URI</b> in each provider's console → ③ Configure <code>spring.security.oauth2.client.registration.*</code> → ④ Enable <code>oauth2Login()</code> in SecurityConfig.
i1.21=Requirements: developer registration with each provider, callback URL whitelist
i1.22=Captcha / LDAP (ext/captcha · ext/ldapumt)
i1.23=An image captcha library (or reCAPTCHA) and an LDAP/AD directory server are required.
i1.24=<b>Captcha</b>: Generate server images with kaptcha or verify Google reCAPTCHA (site key·secret) on the server. <b>LDAP</b>: <b>spring-boot-starter-data-ldap</b> + directory connection info → user sync batch.
i1.25=Modules preceded by batch aggregation
i1.26=Batch aggregation
i1.27=Usage statistics (sts/bst·dst·rst·sst·ust)
i1.28=Statistics screens are structured to query <b>aggregate summary tables pre-loaded by a daily batch</b>.
i1.29=① Aggregate source tables (board <code>TB_BBS</code>·access logs, etc.) via ② a <b>daily batch (the already-implemented sym/bat Quartz scheduler)</b> → ③ load into <code>TB_*_SUMMARY</code> (by occurrence date) → ④ statistics screens query the summary and display charts.
i1.30=Note: Access statistics (sts/cst) use a live-query approach, so they <b>already work in the catalog</b>. The rest require writing the above aggregation jobs and registering schedules first.
i1.31=Modules with large multi-entity associations
i1.32=Association base
i1.33=Address book (cop/adb) · Community (cop/cmy) · Scrap (cop/scp)
i1.34=Multi-panel screens where many tables and mapping relationships (members·organizations·business cards·boards) are intertwined.
i1.35=① Standardize·port the related tables (member·organization·business card·board mappings) together → ② Compose the multi-panel (search conditions·list·selection area) UI → ③ Integrate mapping CRUD. Since the scope is larger than a single list, port step by step starting from the association base.
i1.36=Back to the example catalog
i1.37=Road Name Address Integration
