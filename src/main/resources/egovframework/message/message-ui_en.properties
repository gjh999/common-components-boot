about.panel.body=The eGovFrame Standard Framework forms the foundation of application software and provides the basic functions required when running applications.<br/>To improve the quality of e-government services and the efficiency of IT investment, the Standard Framework establishes development framework standards, aiming to standardize application software and enhance quality and reusability through their adoption.
history.crumb=History
history.panel.title=History
history.panel.body=As a dedicated organization for activating the Standard Framework, the eGovFrame Center was established at the National Information Society Agency (NIA) on November 4, 2010. It is composed of NIA staff responsible for policy support and global expansion, and external private experts responsible for R&amp;D and technical support.
