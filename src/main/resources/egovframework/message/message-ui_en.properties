org.panel.body=For the initial settlement of the open community, a leading group (PMC, committers) was formed with Standard Framework developers and operators and experts of major domestic open communities. A transparent and fair decision-making system was established so that community members who actively participate in project activities can take on leading group roles, ensuring the continuous expansion and development of the open community.
