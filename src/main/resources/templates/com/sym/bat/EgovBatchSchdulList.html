<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i4.52}">배치 스케줄 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:1100px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/examples}" th:text="#{cat.crumb}">공통컴포넌트 예제</a></li>
        <li class="breadcrumb-item active" th:text="#{i4.52}">배치 스케줄 관리</li></ol></nav>
    <div class="d-flex justify-content-between align-items-center mb-3"><h1 class="h4 mb-0"><i class="bi bi-calendar-week"></i> <span th:text="#{i4.52}">배치 스케줄 관리</span></h1></div>
    <div class="d-flex justify-content-between align-items-center mb-2"><span class="text-muted small"><span th:text="#{list.total}">전체</span>
        <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong> <span th:text="#{list.count.unit}">건</span></span></div>
    <div class="krds-table-wrap"><table class="tbl">
        <thead><tr>
            <th scope="col" style="width:70px;" th:text="#{list.seq}">순번</th>
            <th scope="col" th:text="#{i4.53}">대상 작업</th><th scope="col" style="width:120px;" th:text="#{i4.54}">실행 주기</th>
            <th scope="col" style="width:120px;" th:text="#{i4.55}">실행 시각</th><th scope="col" th:text="#{i4.56}">실행 프로그램</th>
        </tr></thead>
        <tbody>
        <tr th:each="item,stat : ${resultList}">
            <td class="text-center" th:text="${stat.count}">1</td>
            <td th:text="${item.batchOpertNm}">작업명</td>
            <td class="text-center"><span class="krds-badge bg-info" th:text="${item.executCycle == '0'} ? #{i4.57} : #{i4.58}">매일</span></td>
            <td class="text-center"><span th:text="${item.executSchdulHour}">02</span>:<span th:text="${item.executSchdulMnt}">00</span></td>
            <td class="small text-muted" th:text="${item.batchProgrm}">프로그램</td>
        </tr>
        <tr th:if="${resultList == null or #lists.isEmpty(resultList)}"><td colspan="5" class="text-center text-muted py-4" th:text="#{i4.59}">등록된 배치 스케줄이 없습니다.</td></tr>
        </tbody>
    </table></div>
    <div th:if="${paginationInfo != null}" th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/sym/bat/getBatchSchdulList.do', searchCondition='', searchKeyword=${searchKeyword})}"></div>
</div>
</main>
</body>
</html>
