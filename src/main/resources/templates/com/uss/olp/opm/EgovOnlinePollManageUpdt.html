<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i2.40}">온라인 투표 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/olp/opm/listOnlinePollManage.do}" th:text="#{i2.40}">온라인 투표 관리</a></li>
        <li class="breadcrumb-item active" th:text="#{button.modify}">수정</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-bar-chart-line"></i> <span th:text="#{i2.40}">온라인 투표 관리</span> - <span th:text="#{button.modify}">수정</span></h1>

    <form th:action="@{/uss/olp/opm/updtOnlinePollManage.do}" method="post" th:object="${onlinePollManage}">
        <input type="hidden" th:field="*{pollId}"/>
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i2.42}">투표명</legend>
            <div class="row g-3">
                <div class="col-12"><label class="form-label"><span th:text="#{i2.42}">투표명</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{pollNm}" maxlength="255" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i2.10}">시작일</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="date" th:field="*{pollBeginDe}" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i2.11}">종료일</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="date" th:field="*{pollEndDe}" required/></div>
                <div class="col-md-4"><label class="form-label"><span th:text="#{c4.3}">투표 종류</span> <span class="frm-rq">*</span></label>
                    <select class="krds-form-select" th:field="*{pollKindCode}">
                        <option value="" th:text="#{c4.10}">선택</option>
                        <option th:each="c : ${pollKindCodeList}" th:value="${c.code}" th:text="${c.codeNm}">종류</option>
                    </select></div>
                <div class="col-md-4"><label class="form-label"><span th:text="#{c4.4}">폐기 여부</span> <span class="frm-rq">*</span></label>
                    <select class="krds-form-select" th:field="*{pollDsuseYn}" required>
                        <option value="N" th:text="#{c4.6}">진행</option>
                        <option value="Y" th:text="#{c4.7}">폐기</option>
                    </select></div>
                <div class="col-md-4"><label class="form-label"><span th:text="#{c4.5}">자동 폐기</span> <span class="frm-rq">*</span></label>
                    <select class="krds-form-select" th:field="*{pollAutoDsuseYn}" required>
                        <option value="Y" th:text="#{c4.8}">사용</option>
                        <option value="N" th:text="#{c4.9}">미사용</option>
                    </select></div>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <a class="krds-btn tertiary" th:href="@{/uss/olp/opm/detailOnlinePollManage.do(pollId=${onlinePollManage.pollId})}" th:text="#{button.cancel}">취소</a>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
