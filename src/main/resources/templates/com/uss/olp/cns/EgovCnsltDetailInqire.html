<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i2.45}">상담 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/olp/cns/CnsltListInqire.do}" th:text="#{i2.45}">상담 관리</a></li>
        <li class="breadcrumb-item active" th:text="${result.cnsltSj}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-chat-dots"></i> <span th:text="${result.cnsltSj}">상담 제목</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:140px;" th:text="#{i2.47}">상담 제목</th><td th:text="${result.cnsltSj}">제목</td></tr>
            <tr><th scope="row" th:text="#{i2.48}">작성자</th><td th:text="${result.emplyrNm}">작성자</td></tr>
            <tr><th scope="row" th:text="#{i2.49}">공개</th><td th:text="${result.othbcAt == 'Y'} ? #{c6.14} : #{c6.15}">공개여부</td></tr>
            <tr><th scope="row" th:text="#{i5.30}">이메일</th><td th:text="${result.emailAdres}">이메일</td></tr>
            <tr><th scope="row" th:text="#{i2.50}">등록일</th><td th:text="${result.frstRegisterPnttm}">등록일</td></tr>
            <tr><th scope="row" th:text="#{i1.218}">내용</th><td style="white-space:pre-wrap;" th:text="${result.cnsltCn}">내용</td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/uss/olp/cns/CnsltListInqire.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/uss/olp/cns/CnsltDtlsDelete.do}" method="post" onsubmit="return confirm('삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="cnsltId" th:value="${result.cnsltId}"/>
                <input type="hidden" name="atchFileId" th:value="${result.atchFileId}"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/uss/olp/cns/CnsltPasswordConfirmView.do(cnsltId=${result.cnsltId})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
