<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i1.230}">회의 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;" th:with="r=${resultList != null and !#lists.isEmpty(resultList)} ? ${resultList[0]} : null">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/olp/mgt/EgovMeetingManageList.do}" th:text="#{i1.230}">회의 관리</a></li>
        <li class="breadcrumb-item active" th:text="#{button.modify}">수정</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-people-fill"></i> <span th:text="#{i1.230}">회의 관리</span> - <span th:text="#{button.modify}">수정</span></h1>

    <form th:action="@{/uss/olp/mgt/EgovMeetingManageModify.do}" method="post">
        <input type="hidden" name="mtgId" th:value="${r != null ? r.mtgId : ''}"/>
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i1.231}">회의명</legend>
            <div class="row g-3">
                <div class="col-12"><label class="form-label"><span th:text="#{i1.231}">회의명</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" name="mtgNm" th:value="${r != null ? r.mtgNm : ''}" maxlength="250" required/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{c6.5}">회의안건</span> <span class="frm-rq">*</span></label>
                    <textarea class="krds-input" name="mtgMtrCn" rows="4" maxlength="1000" required th:text="${r != null ? r.mtgMtrCn : ''}"></textarea></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c6.6}">회의순번</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="number" min="0" name="mtgSn" th:value="${r != null ? r.mtgSn : ''}" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c6.7}">회의수</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="number" min="0" name="mtgCo" th:value="${r != null ? r.mtgCo : ''}" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i1.232}">회의일자</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="date" name="mtgDe" th:value="${r != null ? r.mtgDe : ''}" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i1.233}">장소</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" name="mtgPlace" th:value="${r != null ? r.mtgPlace : ''}" maxlength="250" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i1.234}">시간</span> <span class="frm-rq">*</span></label>
                    <div class="d-flex align-items-center gap-2">
                        <input class="krds-input" type="time" name="mtgBeginTime" th:value="${r != null ? r.mtgBeginTime : ''}" required/> ~
                        <input class="krds-input" type="time" name="mtgEndTime" th:value="${r != null ? r.mtgEndTime : ''}" required/></div></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c6.8}">열람개시일자</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="date" name="readngBeginDe" th:value="${r != null ? r.readngBeginDe : ''}" required/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{c6.10}">회의결과</span></label>
                    <textarea class="krds-input" name="mtgResultCn" rows="3" maxlength="1000" th:text="${r != null ? r.mtgResultCn : ''}"></textarea></div>
                <input type="hidden" name="mtgBeginHH" value="00"/>
                <input type="hidden" name="mtgBeginMM" value="00"/>
                <input type="hidden" name="mtgEndHH" value="00"/>
                <input type="hidden" name="mtgEndMM" value="00"/>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <a class="krds-btn tertiary" th:href="@{/uss/olp/mgt/EgovMeetingManageList.do}" th:text="#{button.cancel}">취소</a>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
