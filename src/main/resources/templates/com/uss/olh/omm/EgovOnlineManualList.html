<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>온라인 매뉴얼</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:1050px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/examples}" th:text="#{cat.crumb}">공통컴포넌트 예제</a></li>
        <li class="breadcrumb-item active" th:text="#{i2.52}">온라인 매뉴얼</li></ol></nav>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0"><i class="bi bi-journal-text"></i> <span th:text="#{i2.52}">온라인 매뉴얼</span></h1>
        <a class="krds-btn primary" th:href="@{/uss/olh/omm/insertOnlineManualView.do}"><i class="bi bi-plus-lg"></i> <span th:text="#{button.regist}">등록</span></a></div>
    <form th:action="@{/uss/olh/omm/selectOnlineManualList.do}" method="get" class="search-bar krds-search mb-3">
        <div class="row g-2 align-items-end">
            <div class="col-md-9"><div class="form-group"><div class="form-tit"><label for="searchKeyword" th:text="#{search.keyword}">검색어</label></div>
                <div class="form-conts"><input type="text" id="searchKeyword" name="searchKeyword" class="krds-input" th:value="${searchKeyword}" th:placeholder="#{i2.53}" placeholder="매뉴얼명 검색" maxlength="100"/></div></div></div>
            <div class="col-md-3"><button type="submit" class="krds-btn primary medium w-100"><i class="bi bi-search"></i> <span th:text="#{button.search}">검색</span></button></div>
        </div>
    </form>
    <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="text-muted small"><span th:text="#{list.total}">전체</span>
            <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong> <span th:text="#{list.count.unit}">건</span></span></div>
    <div class="krds-table-wrap"><table class="tbl">
        <thead><tr>
            <th scope="col" style="width:70px;" th:text="#{list.seq}">순번</th>
            <th scope="col" th:text="#{i2.54}">매뉴얼명</th>
            <th scope="col" style="width:130px;" th:text="#{i2.55}">구분</th>
            <th scope="col" th:text="#{i2.56}">정의</th>
            <th scope="col" style="width:120px;" th:text="#{i2.50}">등록일</th>
        </tr></thead>
        <tbody>
        <tr th:each="item,stat : ${resultList}">
            <td class="text-center" th:text="${stat.count}">1</td>
            <td><a th:href="@{/uss/olh/omm/selectOnlineManualDetail.do(onlineMnlId=${item.onlineMnlId})}" th:text="${item.onlineMnlNm}">매뉴얼명</a></td>
            <td class="text-center"><span class="krds-badge bg-info" th:text="${item.onlineMnlSeCodeNm}">구분</span></td>
            <td class="small text-muted" th:text="${item.onlineMnlDf}">정의</td>
            <td class="text-center small" th:text="${item.frstRegisterPnttm}">등록일</td>
        </tr>
        <tr th:if="${resultList == null or #lists.isEmpty(resultList)}"><td colspan="5" class="text-center text-muted py-4" th:text="#{i2.57}">등록된 매뉴얼이 없습니다.</td></tr>
        </tbody>
    </table></div>
    <div th:if="${paginationInfo != null}" th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/uss/olh/omm/selectOnlineManualList.do', searchCondition='', searchKeyword=${searchKeyword})}"></div>
</div>
</main>
</body>
</html>
