<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i2.52}">온라인 매뉴얼</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/olh/omm/selectOnlineManualList.do}" th:text="#{i2.52}">온라인 매뉴얼</a></li>
        <li class="breadcrumb-item active" th:text="${result.onlineMnlNm}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-journal-text"></i> <span th:text="${result.onlineMnlNm}">매뉴얼명</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:160px;" th:text="#{i2.54}">매뉴얼명</th><td th:text="${result.onlineMnlNm}">매뉴얼명</td></tr>
            <tr><th scope="row" th:text="#{i2.55}">구분</th><td th:text="${result.onlineMnlSeCodeNm}">구분</td></tr>
            <tr><th scope="row" th:text="#{i2.56}">정의</th><td style="white-space:pre-wrap;" th:text="${result.onlineMnlDf}">정의</td></tr>
            <tr><th scope="row" th:text="#{i4.3}">설명</th><td style="white-space:pre-wrap;" th:text="${result.onlineMnlDc}">설명</td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/uss/olh/omm/selectOnlineManualList.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/uss/olh/omm/deleteOnlineManual.do}" method="post" onsubmit="return confirm('삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="onlineMnlId" th:value="${result.onlineMnlId}"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/uss/olh/omm/updateOnlineManualView.do(onlineMnlId=${result.onlineMnlId})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
