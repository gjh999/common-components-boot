<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i3.11}">행정 용어 사전</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/olh/awm/selectAdministrationWordList.do}" th:text="#{i3.11}">행정 용어 사전</a></li>
        <li class="breadcrumb-item active" th:text="#{button.modify}">수정</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-translate"></i> <span th:text="#{i3.11}">행정 용어 사전</span> - <span th:text="#{button.modify}">수정</span></h1>

    <form th:action="@{/uss/olh/awm/updateAdministrationWord.do}" method="post" th:object="${administrationWordVO}">
        <input type="hidden" th:field="*{administWordId}"/>
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i3.12}">용어</legend>
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label"><span th:text="#{i3.12}">용어</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{administWordNm}" maxlength="255" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i3.13}">영문명</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{administWordEngNm}" maxlength="255" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c3.3}">약어</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{administWordAbrv}" maxlength="255" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c3.4}">주제영역</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{themaRelm}" maxlength="255" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c3.5}">용어구분</span> <span class="frm-rq">*</span></label>
                    <select class="krds-input" th:field="*{wordDomn}">
                        <option value="" th:text="#{c3.6}">선택</option>
                        <option th:each="code : ${wordSeCode}" th:value="${code.code}" th:text="${code.codeNm}">구분</option>
                    </select></div>
                <div class="col-12"><label class="form-label" th:text="#{i3.14}">정의</label>
                    <textarea class="krds-input" th:field="*{administWordDf}" rows="4" maxlength="2500"></textarea></div>
                <div class="col-12"><label class="form-label" th:text="#{i4.3}">설명</label>
                    <textarea class="krds-input" th:field="*{administWordDc}" rows="4" maxlength="2500"></textarea></div>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <a class="krds-btn tertiary" th:href="@{/uss/olh/awm/selectAdministrationWordDetail.do(administWordId=${administrationWordVO.administWordId})}" th:text="#{button.cancel}">취소</a>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
