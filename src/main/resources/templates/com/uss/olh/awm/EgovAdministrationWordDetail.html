<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i3.11}">행정 용어 사전</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/olh/awm/selectAdministrationWordList.do}" th:text="#{i3.11}">행정 용어 사전</a></li>
        <li class="breadcrumb-item active" th:text="${result.administWordNm}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-translate"></i> <span th:text="${result.administWordNm}">용어</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:160px;" th:text="#{i3.12}">용어</th><td th:text="${result.administWordNm}">용어</td></tr>
            <tr><th scope="row" th:text="#{i3.13}">영문명</th><td th:text="${result.administWordEngNm}">영문명</td></tr>
            <tr><th scope="row" th:text="#{c3.3}">약어</th><td th:text="${result.administWordAbrv}">약어</td></tr>
            <tr><th scope="row" th:text="#{c3.4}">주제영역</th><td th:text="${result.themaRelm}">주제영역</td></tr>
            <tr><th scope="row" th:text="#{c3.5}">용어구분</th><td th:text="${result.wordDomnNm}">용어구분</td></tr>
            <tr><th scope="row" th:text="#{i3.14}">정의</th><td style="white-space:pre-wrap;" th:text="${result.administWordDf}">정의</td></tr>
            <tr><th scope="row" th:text="#{i4.3}">설명</th><td style="white-space:pre-wrap;" th:text="${result.administWordDc}">설명</td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/uss/olh/awm/selectAdministrationWordList.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/uss/olh/awm/deleteAdministrationWord.do}" method="post" onsubmit="return confirm(window.CONFIRM_DELETE || '삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="administWordId" th:value="${result.administWordId}"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/uss/olh/awm/updateAdministrationWordView.do(administWordId=${result.administWordId})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
