<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i4.46}">도움말 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/olh/hpc/selectHpcmList.do}" th:text="#{i4.46}">도움말 관리</a></li>
        <li class="breadcrumb-item active" th:text="#{button.regist}">등록</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-question-square"></i> <span th:text="#{i4.46}">도움말 관리</span> - <span th:text="#{button.regist}">등록</span></h1>

    <form th:action="@{/uss/olh/hpc/insertHpcm.do}" method="post" th:object="${hpcmVO}">
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i4.47}">도움말 제목</legend>
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label"><span th:text="#{c3.7}">구분</span> <span class="frm-rq">*</span></label>
                    <select class="krds-input" th:field="*{hpcmSeCode}">
                        <option value="" th:text="#{c3.6}">선택</option>
                        <option th:each="code : ${hpcmSeCode}" th:value="${code.code}" th:text="${code.codeNm}">구분</option>
                    </select></div>
                <div class="col-12"><label class="form-label"><span th:text="#{i4.47}">도움말 제목</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{hpcmDf}" maxlength="1000" required/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{i4.3}">설명</span> <span class="frm-rq">*</span></label>
                    <textarea class="krds-input" th:field="*{hpcmDc}" rows="8" maxlength="2500" required></textarea></div>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <a class="krds-btn tertiary" th:href="@{/uss/olh/hpc/selectHpcmList.do}" th:text="#{button.cancel}">취소</a>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.regist}">등록</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
