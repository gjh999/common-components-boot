<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i4.46}">도움말 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/olh/hpc/selectHpcmList.do}" th:text="#{i4.46}">도움말 관리</a></li>
        <li class="breadcrumb-item active" th:text="${result.hpcmDf}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-question-square"></i> <span th:text="${result.hpcmDf}">도움말 제목</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:160px;" th:text="#{c3.7}">구분</th><td th:text="${result.hpcmSeCodeNm}">구분</td></tr>
            <tr><th scope="row" th:text="#{i4.47}">도움말 제목</th><td th:text="${result.hpcmDf}">제목</td></tr>
            <tr><th scope="row" th:text="#{i4.3}">설명</th><td style="white-space:pre-wrap;" th:text="${result.hpcmDc}">설명</td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/uss/olh/hpc/selectHpcmList.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/uss/olh/hpc/deleteHpcm.do}" method="post" onsubmit="return confirm(window.CONFIRM_DELETE || '삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="hpcmId" th:value="${result.hpcmId}"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/uss/olh/hpc/updateHpcmView.do(hpcmId=${result.hpcmId})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
