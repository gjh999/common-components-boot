<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i1.210}">용어 사전 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/olh/wor/selectWordDicaryList.do}" th:text="#{i1.210}">용어 사전 관리</a></li>
        <li class="breadcrumb-item active" th:text="#{button.modify}">수정</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-journal-text"></i> <span th:text="#{i1.210}">용어 사전 관리</span> - <span th:text="#{button.modify}">수정</span></h1>

    <form th:action="@{/uss/olh/wor/updateWordDicary.do}" method="post" th:object="${wordDicaryVO}">
        <input type="hidden" th:field="*{wordId}"/>
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i1.212}">용어명</legend>
            <div class="row g-3">
                <div class="col-12"><label class="form-label"><span th:text="#{i1.212}">용어명</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{wordNm}" maxlength="250" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i1.214}">영문명</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{engNm}" maxlength="60" required/></div>
                <div class="col-md-6"><label class="form-label" th:text="#{c4.1}">동의어</label>
                    <input class="krds-input" type="text" th:field="*{synonm}" maxlength="100"/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{i1.213}">설명</span> <span class="frm-rq">*</span></label>
                    <textarea class="krds-input" th:field="*{wordDc}" rows="8" maxlength="2500" required></textarea></div>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <a class="krds-btn tertiary" th:href="@{/uss/olh/wor/selectWordDicaryDetail.do(wordId=${wordDicaryVO.wordId})}" th:text="#{button.cancel}">취소</a>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
