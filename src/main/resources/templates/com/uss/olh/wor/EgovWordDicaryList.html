<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title th:text="#{i1.210}">용어 사전 관리</title>
</head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:1050px;">

    <nav aria-label="breadcrumb" class="mb-2">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/examples}" th:text="#{cat.crumb}">공통컴포넌트 예제</a></li>
            <li class="breadcrumb-item active" th:text="#{i1.211}">용어 사전</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0"><i class="bi bi-journal-text"></i> <span th:text="#{i1.210}">용어 사전 관리</span></h1>
        <a class="krds-btn primary" th:href="@{/uss/olh/wor/insertWordDicaryView.do}"><i class="bi bi-plus-lg"></i> <span th:text="#{button.regist}">등록</span></a>
    </div>

    <form th:action="@{/uss/olh/wor/selectWordDicaryList.do}" method="get" class="search-bar krds-search mb-3">
        <div class="row g-2 align-items-end">
            <div class="col-md-3">
                <div class="form-group">
                    <div class="form-tit"><label for="searchCnd" th:text="#{i1.193}">검색구분</label></div>
                    <div class="form-conts">
                        <select id="searchCnd" name="searchCnd" class="krds-form-select">
                            <option value="0" th:selected="${searchCnd == '0'}" th:text="#{i1.212}">용어명</option>
                            <option value="1" th:selected="${searchCnd == '1'}" th:text="#{i1.213}">설명</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <div class="form-tit"><label for="searchWrd" th:text="#{search.keyword}">검색어</label></div>
                    <div class="form-conts"><input type="text" id="searchWrd" name="searchWrd" class="krds-input"
                           th:value="${searchWrd}" th:placeholder="#{search.keyword.placeholder}" placeholder="용어 검색" maxlength="100"/></div>
                </div>
            </div>
            <div class="col-md-3">
                <button type="submit" class="krds-btn primary medium w-100"><i class="bi bi-search"></i> <span th:text="#{button.search}">검색</span></button>
            </div>
        </div>
    </form>

    <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="text-muted small"><span th:text="#{list.total}">전체</span>
            <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong>
            <span th:text="#{list.count.unit}">건</span></span>
    </div>

    <div class="krds-table-wrap">
        <table class="tbl">
            <thead>
            <tr>
                <th scope="col" style="width:70px;" th:text="#{list.seq}">순번</th>
                <th scope="col" style="width:180px;" th:text="#{i1.212}">용어명</th>
                <th scope="col" style="width:160px;" th:text="#{i1.214}">영문명</th>
                <th scope="col" th:text="#{i1.213}">설명</th>
                <th scope="col" style="width:110px;" th:text="#{i1.197}">등록자</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item,stat : ${resultList}">
                <td class="text-center" th:text="${stat.count}">1</td>
                <td><a th:href="@{/uss/olh/wor/selectWordDicaryDetail.do(wordId=${item.wordId})}"><strong th:text="${item.wordNm}">용어명</strong></a></td>
                <td class="text-muted" th:text="${item.engNm}">영문명</td>
                <td class="small" th:text="${item.wordDc}">설명</td>
                <td class="text-center" th:text="${item.emplyrNm}">등록자</td>
            </tr>
            <tr th:if="${resultList == null or #lists.isEmpty(resultList)}">
                <td colspan="5" class="text-center text-muted py-4" th:text="#{i1.215}">등록된 용어가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${paginationInfo != null}"
         th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/uss/olh/wor/selectWordDicaryList.do', searchCondition='', searchKeyword=${searchWrd})}"></div>

</div>
</main>
</body>
</html>
