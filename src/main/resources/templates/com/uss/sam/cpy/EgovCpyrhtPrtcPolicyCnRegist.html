<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i4.43}">저작권 보호정책</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/sam/cpy/CpyrhtPrtcPolicyListInqire.do}" th:text="#{i4.43}">저작권 보호정책</a></li>
        <li class="breadcrumb-item active" th:text="#{button.regist}">등록</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-c-circle"></i> <span th:text="#{i4.43}">저작권 보호정책</span> - <span th:text="#{button.regist}">등록</span></h1>

    <form th:action="@{/uss/sam/cpy/CpyrhtPrtcPolicyCnRegist.do}" method="post" th:object="${cpyrhtPrtcPolicyVO}">
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i4.44}">정책 내용</legend>
            <div class="row g-3">
                <div class="col-12"><label class="form-label"><span th:text="#{i4.44}">정책 내용</span> <span class="frm-rq">*</span></label>
                    <textarea class="krds-input" th:field="*{cpyrhtPrtcPolicyCn}" rows="12" maxlength="2500" required></textarea></div>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <a class="krds-btn tertiary" th:href="@{/uss/sam/cpy/CpyrhtPrtcPolicyListInqire.do}" th:text="#{button.cancel}">취소</a>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.regist}">등록</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
