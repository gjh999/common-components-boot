<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i4.43}">저작권 보호정책</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:1000px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/examples}" th:text="#{cat.crumb}">공통컴포넌트 예제</a></li>
        <li class="breadcrumb-item active" th:text="#{i4.43}">저작권 보호정책</li></ol></nav>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0"><i class="bi bi-c-circle"></i> <span th:text="#{i4.43}">저작권 보호정책</span></h1>
        <a class="krds-btn primary" th:href="@{/uss/sam/cpy/CpyrhtPrtcPolicyCnRegistView.do}"><i class="bi bi-plus-lg"></i> <span th:text="#{button.regist}">등록</span></a></div>
    <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="text-muted small"><span th:text="#{list.total}">전체</span>
            <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong> <span th:text="#{list.count.unit}">건</span></span></div>
    <div class="krds-table-wrap"><table class="tbl">
        <thead><tr>
            <th scope="col" style="width:70px;" th:text="#{list.seq}">순번</th>
            <th scope="col" th:text="#{i4.44}">정책 내용</th>
            <th scope="col" style="width:120px;" th:text="#{common.regdate}">등록일</th>
        </tr></thead>
        <tbody>
        <tr th:each="item,stat : ${resultList}">
            <td class="text-center" th:text="${stat.count}">1</td>
            <td><a th:href="@{/uss/sam/cpy/CpyrhtPrtcPolicyDetailInqire.do(cpyrhtId=${item.cpyrhtId})}" th:text="${item.cpyrhtPrtcPolicyCn}">정책 내용</a></td>
            <td class="text-center small" th:text="${item.frstRegisterPnttm}">등록일</td>
        </tr>
        <tr th:if="${resultList == null or #lists.isEmpty(resultList)}"><td colspan="3" class="text-center text-muted py-4" th:text="#{i4.45}">등록된 정책이 없습니다.</td></tr>
        </tbody>
    </table></div>
    <div th:if="${paginationInfo != null}" th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/uss/sam/cpy/CpyrhtPrtcPolicyListInqire.do', searchCondition='', searchKeyword=${searchKeyword})}"></div>
</div>
</main>
</body>
</html>
