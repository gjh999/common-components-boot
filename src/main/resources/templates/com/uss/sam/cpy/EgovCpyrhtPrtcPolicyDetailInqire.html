<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i4.43}">저작권 보호정책</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/sam/cpy/CpyrhtPrtcPolicyListInqire.do}" th:text="#{i4.43}">저작권 보호정책</a></li>
        <li class="breadcrumb-item active" th:text="#{c4.2}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-c-circle"></i> <span th:text="#{i4.43}">저작권 보호정책</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:140px;" th:text="#{i4.44}">정책 내용</th><td style="white-space:pre-wrap;" th:text="${result.cpyrhtPrtcPolicyCn}">정책 내용</td></tr>
            <tr><th scope="row" th:text="#{common.regdate}">등록일</th><td th:text="${result.frstRegisterPnttm}">등록일</td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/uss/sam/cpy/CpyrhtPrtcPolicyListInqire.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/uss/sam/cpy/CpyrhtPrtcPolicyCnDelete.do}" method="post" onsubmit="return confirm('삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="cpyrhtId" th:value="${result.cpyrhtId}"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/uss/sam/cpy/CpyrhtPrtcPolicyCnUpdtView.do(cpyrhtId=${result.cpyrhtId})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
