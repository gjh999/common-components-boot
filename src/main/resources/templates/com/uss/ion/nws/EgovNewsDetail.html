<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i3.54}">뉴스 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/nws/selectNewsList.do}" th:text="#{i3.54}">뉴스 관리</a></li>
        <li class="breadcrumb-item active" th:text="${newsVO.newsSj}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-newspaper"></i> <span th:text="${newsVO.newsSj}">뉴스 제목</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:140px;" th:text="#{i3.55}">뉴스 제목</th><td th:text="${newsVO.newsSj}">제목</td></tr>
            <tr><th scope="row" th:text="#{i3.56}">출처</th><td th:text="${newsVO.newsOrigin}">출처</td></tr>
            <tr><th scope="row" th:text="#{i3.57}">게시일</th><td th:text="${newsVO.ntceDe}">게시일</td></tr>
            <tr><th scope="row" th:text="#{i1.218}">내용</th><td style="white-space:pre-wrap;" th:text="${newsVO.newsCn}">내용</td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/uss/ion/nws/selectNewsList.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/uss/ion/nws/deleteNews.do}" method="post" onsubmit="return confirm('삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="newsId" th:value="${newsVO.newsId}"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/uss/ion/nws/updateNewsView.do(newsId=${newsVO.newsId})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
