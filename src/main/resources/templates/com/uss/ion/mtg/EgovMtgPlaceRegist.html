<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i2.64}">회의실 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/mtg/selectMtgPlaceManageList.do}" th:text="#{i2.64}">회의실 관리</a></li>
        <li class="breadcrumb-item active" th:text="#{button.regist}">등록</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-easel"></i> <span th:text="#{i2.64}">회의실 관리</span> - <span th:text="#{button.regist}">등록</span></h1>

    <form th:action="@{/uss/ion/mtg/insertMtgPlace.do}" method="post" enctype="multipart/form-data" th:object="${mtgPlaceManageVO}">
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i2.64}">회의실 정보</legend>
            <div class="row g-3">
                <div class="col-12"><label class="form-label"><span th:text="#{i2.65}">회의실명</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{mtgPlaceNm}" maxlength="255" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c1.8}">위치구분</span> <span class="frm-rq">*</span></label>
                    <select class="krds-input" th:field="*{lcSe}" required>
                        <option value="" th:text="#{c1.12}">선택</option>
                        <option th:each="code : ${lcSeCode}" th:value="${code.code}" th:text="${code.codeNm}">위치</option>
                    </select></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i2.67}">수용인원</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="number" min="1" th:field="*{aceptncPosblNmpr}" required/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{i2.66}">위치</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{lcDetail}" maxlength="200" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c1.9}">개방시작시간</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="time" th:field="*{opnBeginTm}" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c1.10}">개방종료시간</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="time" th:field="*{opnEndTm}" required/></div>
                <div class="col-12"><label class="form-label" th:text="#{c1.11}">첨부파일</label>
                    <input class="krds-input" type="file" name="file_1"/></div>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <a class="krds-btn tertiary" th:href="@{/uss/ion/mtg/selectMtgPlaceManageList.do}" th:text="#{button.cancel}">취소</a>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.regist}">등록</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
