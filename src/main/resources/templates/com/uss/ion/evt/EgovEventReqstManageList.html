<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title>행사 신청 관리</title>
</head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:1100px;">

    <nav aria-label="breadcrumb" class="mb-2">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/examples}" th:text="#{cat.crumb}">공통컴포넌트 예제</a></li>
            <li class="breadcrumb-item active" th:text="#{i2.8}">행사 신청 관리</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0"><i class="bi bi-calendar-event"></i> <span th:text="#{i2.8}">행사 신청 관리</span></h1>
        <a class="krds-btn primary" th:href="@{/uss/ion/evt/EgovEventReqstRegist.do}"><i class="bi bi-plus-lg"></i> <span th:text="#{button.regist}">등록</span></a>
    </div>

    <form th:action="@{/uss/ion/evt/EgovEventReqstManageList.do}" method="get" class="search-bar krds-search mb-3">
        <div class="row g-2 align-items-end">
            <div class="col-md-9">
                <div class="form-group">
                    <div class="form-tit"><label for="searchNm" th:text="#{search.keyword}">검색어</label></div>
                    <div class="form-conts"><input type="text" id="searchNm" name="searchNm" class="krds-input"
                           th:value="${eventManageVO != null ? eventManageVO.searchNm : ''}" th:placeholder="#{search.keyword.placeholder}" placeholder="행사명 검색" maxlength="100"/></div>
                </div>
            </div>
            <div class="col-md-3">
                <button type="submit" class="krds-btn primary medium w-100"><i class="bi bi-search"></i> <span th:text="#{button.search}">검색</span></button>
            </div>
        </div>
    </form>

    <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="text-muted small"><span th:text="#{list.total}">전체</span>
            <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong>
            <span th:text="#{list.count.unit}">건</span></span>
    </div>

    <div class="krds-table-wrap">
        <table class="tbl">
            <thead>
            <tr>
                <th scope="col" style="width:70px;" th:text="#{list.seq}">순번</th>
                <th scope="col" th:text="#{i2.9}">행사명</th>
                <th scope="col" style="width:130px;" th:text="#{i2.10}">시작일</th>
                <th scope="col" style="width:130px;" th:text="#{i2.11}">종료일</th>
                <th scope="col" th:text="#{i2.12}">장소</th>
                <th scope="col" style="width:140px;" th:text="#{i2.13}">주관기관</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item,stat : ${eventManageList}">
                <td class="text-center" th:text="${stat.count}">1</td>
                <td><a th:href="@{/uss/ion/evt/EgovEventReqstDetail.do(eventId=${item.eventId})}" th:text="${item.eventNm}">행사명</a></td>
                <td class="text-center" th:text="${item.eventBeginDe}">시작일</td>
                <td class="text-center" th:text="${item.eventEndDe}">종료일</td>
                <td th:text="${item.eventPlace}">장소</td>
                <td class="text-center" th:text="${item.eventMngtInsttNm}">주관기관</td>
            </tr>
            <tr th:if="${eventManageList == null or #lists.isEmpty(eventManageList)}">
                <td colspan="6" class="text-center text-muted py-4" th:text="#{i2.14}">등록된 행사가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${paginationInfo != null}"
         th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/uss/ion/evt/EgovEventReqstManageList.do', searchCondition='', searchKeyword=${eventManageVO != null ? eventManageVO.searchNm : ''})}"></div>

</div>
</main>
</body>
</html>
