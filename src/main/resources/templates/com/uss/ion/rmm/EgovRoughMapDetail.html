<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i3.42}">약도 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/com/uss/ion/rmm/selectRoughMapList.do}" th:text="#{i3.42}">약도 관리</a></li>
        <li class="breadcrumb-item active" th:text="${roughMap.roughMapSj}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-geo-alt"></i> <span th:text="${roughMap.roughMapSj}">약도 제목</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:140px;" th:text="#{i3.43}">약도 제목</th><td th:text="${roughMap.roughMapSj}">제목</td></tr>
            <tr><th scope="row" th:text="#{i3.44}">주소</th><td th:text="${roughMap.roughMapAddress}">주소</td></tr>
            <tr><th scope="row" th:text="#{c2.7}">말풍선</th><td style="white-space:pre-wrap;" th:text="${roughMap.infoWindow}">말풍선</td></tr>
            <tr><th scope="row" th:text="#{c2.8}">지도 위도/경도</th><td><span th:text="${roughMap.la}">위도</span> / <span th:text="${roughMap.lo}">경도</span></td></tr>
            <tr><th scope="row" th:text="#{c2.9}">마커 위도/경도</th><td><span th:text="${roughMap.markerLa}">위도</span> / <span th:text="${roughMap.markerLo}">경도</span></td></tr>
            <tr><th scope="row" th:text="#{c2.10}">확대 수준</th><td th:text="${roughMap.zoomLevel}">확대</td></tr>
            <tr><th scope="row" th:text="#{i3.45}">수정일</th><td th:text="${roughMap.lastUpdusrPnttm}">수정일</td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/com/uss/ion/rmm/selectRoughMapList.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/com/uss/ion/rmm/deleteRoughMap.do}" method="post" onsubmit="return confirm('삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="roughMapId" th:value="${roughMap.roughMapId}"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/com/uss/ion/rmm/updateRoughMapView.do(roughMapId=${roughMap.roughMapId})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
