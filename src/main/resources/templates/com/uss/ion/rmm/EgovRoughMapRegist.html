<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i3.42}">약도 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/com/uss/ion/rmm/selectRoughMapList.do}" th:text="#{i3.42}">약도 관리</a></li>
        <li class="breadcrumb-item active" th:text="#{button.regist}">등록</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-geo-alt"></i> <span th:text="#{i3.42}">약도 관리</span> - <span th:text="#{button.regist}">등록</span></h1>

    <form th:action="@{/com/uss/ion/rmm/insertRoughMap.do}" method="post" th:object="${roughMap}">
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i3.42}">약도 관리</legend>
            <div class="row g-3">
                <div class="col-12"><label class="form-label"><span th:text="#{i3.43}">약도 제목</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{roughMapSj}" maxlength="100" required/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{i3.44}">주소</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{roughMapAddress}" maxlength="200" required/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{c2.7}">말풍선</span> <span class="frm-rq">*</span></label>
                    <textarea class="krds-input" th:field="*{infoWindow}" rows="3" maxlength="500" required></textarea></div>
                <div class="col-md-6"><label class="form-label" th:text="#{c2.11}">지도 위도</label>
                    <input class="krds-input" type="text" th:field="*{la}" maxlength="30"/></div>
                <div class="col-md-6"><label class="form-label" th:text="#{c2.12}">지도 경도</label>
                    <input class="krds-input" type="text" th:field="*{lo}" maxlength="30"/></div>
                <div class="col-md-6"><label class="form-label" th:text="#{c2.13}">마커 위도</label>
                    <input class="krds-input" type="text" th:field="*{markerLa}" maxlength="30"/></div>
                <div class="col-md-6"><label class="form-label" th:text="#{c2.14}">마커 경도</label>
                    <input class="krds-input" type="text" th:field="*{markerLo}" maxlength="30"/></div>
                <div class="col-md-6"><label class="form-label" th:text="#{c2.10}">확대 수준</label>
                    <input class="krds-input" type="text" th:field="*{zoomLevel}" maxlength="5"/></div>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <a class="krds-btn tertiary" th:href="@{/com/uss/ion/rmm/selectRoughMapList.do}" th:text="#{button.cancel}">취소</a>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.regist}">등록</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
