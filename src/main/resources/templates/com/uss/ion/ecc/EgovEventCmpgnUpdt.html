<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i2.25}">행사 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/ecc/selectEventCmpgnList.do}" th:text="#{i2.25}">행사 관리</a></li>
        <li class="breadcrumb-item active" th:text="#{button.modify}">수정</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-megaphone"></i> <span th:text="#{i2.25}">행사 관리</span> - <span th:text="#{button.modify}">수정</span></h1>

    <form th:action="@{/uss/ion/ecc/updateEventCmpgn.do}" method="post" th:object="${eventCmpgnVO}">
        <input type="hidden" th:field="*{eventId}"/>
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i2.26}">행사 내용</legend>
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label"><span th:text="#{i2.21}">행사유형</span> <span class="frm-rq">*</span></label>
                    <select class="krds-form-select" th:field="*{eventTyCode}" required>
                        <option value="" th:text="#{i2.16}">선택</option>
                        <option th:each="code : ${eventTyCode}" th:value="${code.code}" th:text="${code.codeNm}">유형</option>
                    </select></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i2.28}">담당자</span></label>
                    <input class="krds-input" type="text" th:field="*{chargerNm}" maxlength="60"/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{i1.218}">내용</span> <span class="frm-rq">*</span></label>
                    <textarea class="krds-input" th:field="*{eventCn}" rows="5" maxlength="1000" required></textarea></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i2.10}">시작일</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="date" th:field="*{eventSvcBeginDe}" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i2.11}">종료일</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="date" th:field="*{eventSvcEndDe}" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i2.29}">정원</span></label>
                    <input class="krds-input" type="number" min="0" th:field="*{svcUseNmprCo}"/></div>
                <div class="col-12"><label class="form-label" th:text="#{c6.1}">준비물</label>
                    <textarea class="krds-input" th:field="*{prparetgCn}" rows="3" maxlength="1000"></textarea></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i2.30}">승인</span> <span class="frm-rq">*</span></label>
                    <select class="krds-form-select" th:field="*{eventConfmAt}" required>
                        <option value="N" th:text="#{c6.3}">미승인</option>
                        <option value="Y" th:text="#{c6.2}">승인</option>
                    </select></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c6.4}">승인일</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="date" th:field="*{eventConfmDe}" required/></div>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <a class="krds-btn tertiary" th:href="@{/uss/ion/ecc/selectEventCmpgnDetail.do(eventId=${eventCmpgnVO.eventId})}" th:text="#{button.cancel}">취소</a>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
