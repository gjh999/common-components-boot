<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i2.25}">행사 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/ecc/selectEventCmpgnList.do}" th:text="#{i2.25}">행사 관리</a></li>
        <li class="breadcrumb-item active" th:text="${result.eventCn}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-megaphone"></i> <span th:text="${result.eventCn}">행사 내용</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:140px;" th:text="#{i2.21}">행사유형</th><td th:text="${result.eventTyCodeNm}">유형</td></tr>
            <tr><th scope="row" th:text="#{i1.218}">내용</th><td style="white-space:pre-wrap;" th:text="${result.eventCn}">내용</td></tr>
            <tr><th scope="row" th:text="#{i2.27}">행사 기간</th><td><span th:text="${result.eventSvcBeginDe}">시작</span> ~ <span th:text="${result.eventSvcEndDe}">종료</span></td></tr>
            <tr><th scope="row" th:text="#{i2.28}">담당자</th><td th:text="${result.chargerNm}">담당자</td></tr>
            <tr><th scope="row" th:text="#{i2.29}">정원</th><td><span th:text="${result.svcUseNmprCo}">0</span><span th:text="#{i2.31}">명</span></td></tr>
            <tr><th scope="row" th:text="#{c6.1}">준비물</th><td style="white-space:pre-wrap;" th:text="${result.prparetgCn}">준비물</td></tr>
            <tr><th scope="row" th:text="#{i2.30}">승인</th><td th:text="${result.eventConfmAt == 'Y'} ? #{c6.2} : #{c6.3}">승인여부</td></tr>
            <tr><th scope="row" th:text="#{c6.4}">승인일</th><td th:text="${result.eventConfmDe}">승인일</td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/uss/ion/ecc/selectEventCmpgnList.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/uss/ion/ecc/deleteEventCmpgn.do}" method="post" onsubmit="return confirm('삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="eventId" th:value="${result.eventId}"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/uss/ion/ecc/updateEventCmpgnView.do(eventId=${result.eventId})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
