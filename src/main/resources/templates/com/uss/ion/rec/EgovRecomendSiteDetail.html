<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i3.47}">추천 사이트 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/rec/selectRecomendSiteList.do}" th:text="#{i3.47}">추천 사이트 관리</a></li>
        <li class="breadcrumb-item active" th:text="${recomendSiteVO.recomendSiteNm}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-hand-thumbs-up"></i> <span th:text="${recomendSiteVO.recomendSiteNm}">사이트명</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:140px;" th:text="#{i3.48}">사이트명</th><td th:text="${recomendSiteVO.recomendSiteNm}">사이트명</td></tr>
            <tr><th scope="row">URL</th><td><a th:href="${recomendSiteVO.recomendSiteUrl}" target="_blank" rel="noopener" th:text="${recomendSiteVO.recomendSiteUrl}">url</a></td></tr>
            <tr><th scope="row" th:text="#{c2.1}">사이트 설명</th><td style="white-space:pre-wrap;" th:text="${recomendSiteVO.recomendSiteDc}">설명</td></tr>
            <tr><th scope="row" th:text="#{c2.2}">추천 사유</th><td style="white-space:pre-wrap;" th:text="${recomendSiteVO.recomendResnCn}">추천사유</td></tr>
            <tr><th scope="row" th:text="#{i3.49}">승인여부</th><td th:text="${recomendSiteVO.recomendConfmAt == 'Y'} ? #{i3.51} : #{i3.52}">미승인</td></tr>
            <tr><th scope="row" th:text="#{i3.50}">승인일</th><td th:text="${recomendSiteVO.confmDe}">승인일</td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/uss/ion/rec/selectRecomendSiteList.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/uss/ion/rec/deleteRecomendSite.do}" method="post" onsubmit="return confirm(window.CONFIRM_DELETE || '삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="recomendSiteId" th:value="${recomendSiteVO.recomendSiteId}"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/uss/ion/rec/updateRecomendSiteView.do(recomendSiteId=${recomendSiteVO.recomendSiteId})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
