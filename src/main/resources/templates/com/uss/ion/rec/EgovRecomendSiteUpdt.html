<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i3.47}">추천 사이트 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/rec/selectRecomendSiteList.do}" th:text="#{i3.47}">추천 사이트 관리</a></li>
        <li class="breadcrumb-item active" th:text="#{button.modify}">수정</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-hand-thumbs-up"></i> <span th:text="#{i3.47}">추천 사이트 관리</span> - <span th:text="#{button.modify}">수정</span></h1>

    <form th:action="@{/uss/ion/rec/updateRecomendSite.do}" method="post" th:object="${recomendSiteVO}">
        <input type="hidden" th:field="*{recomendSiteId}"/>
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i3.47}">추천 사이트 관리</legend>
            <div class="row g-3">
                <div class="col-12"><label class="form-label"><span th:text="#{i3.48}">사이트명</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{recomendSiteNm}" maxlength="100" required/></div>
                <div class="col-12"><label class="form-label">URL <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{recomendSiteUrl}" maxlength="250" required/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{c2.1}">사이트 설명</span> <span class="frm-rq">*</span></label>
                    <textarea class="krds-input" th:field="*{recomendSiteDc}" rows="4" maxlength="1000" required></textarea></div>
                <div class="col-12"><label class="form-label"><span th:text="#{c2.2}">추천 사유</span> <span class="frm-rq">*</span></label>
                    <textarea class="krds-input" th:field="*{recomendResnCn}" rows="4" maxlength="1000" required></textarea></div>
                <div class="col-md-6"><label class="form-label" th:text="#{i3.49}">승인여부</label>
                    <select class="krds-form-select" th:field="*{recomendConfmAt}">
                        <option value="N" th:text="#{i3.52}">미승인</option>
                        <option value="Y" th:text="#{i3.51}">승인</option>
                    </select></div>
                <div class="col-md-6"><label class="form-label" th:text="#{i3.50}">승인일</label>
                    <input class="krds-input" type="date" th:field="*{confmDe}"/></div>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <a class="krds-btn tertiary" th:href="@{/uss/ion/rec/selectRecomendSiteDetail.do(recomendSiteId=${recomendSiteVO.recomendSiteId})}" th:text="#{button.cancel}">취소</a>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
