<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i3.67}">메인 이미지 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/msi/selectMainImageList.do}" th:text="#{i3.67}">메인 이미지 관리</a></li>
        <li class="breadcrumb-item active" th:text="#{button.modify}">수정</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-image"></i> <span th:text="#{i3.67}">메인 이미지 관리</span> - <span th:text="#{button.modify}">수정</span></h1>

    <form th:action="@{/uss/ion/msi/updtMainImage.do}" method="post" enctype="multipart/form-data" th:object="${mainImageVO}">
        <input type="hidden" th:field="*{imageId}"/>
        <input type="hidden" th:field="*{image}"/>
        <input type="hidden" th:field="*{imageFile}"/>
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i3.67}">메인 이미지</legend>
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label"><span th:text="#{i3.68}">이미지명</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{imageNm}" maxlength="10" required/></div>
                <div class="col-md-6"><label class="form-label" th:text="#{i3.70}">반영여부</label>
                    <select class="krds-input" th:field="*{reflctAt}">
                        <option value="Y" th:text="#{i3.71}">반영</option>
                        <option value="N" th:text="#{i3.72}">미반영</option>
                    </select></div>
                <div class="col-12"><label class="form-label" th:text="#{i3.69}">설명</label>
                    <textarea class="krds-input" th:field="*{imageDc}" rows="4" maxlength="200"></textarea></div>
                <div class="col-12"><label class="form-label" th:text="#{c1.7}">이미지 파일</label>
                    <input class="krds-input" type="file" name="file_1" accept="image/*"/>
                    <span class="text-muted small" th:if="${mainImageVO.image != null and mainImageVO.image != ''}" th:text="${mainImageVO.image}">현재파일</span></div>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <div class="d-flex gap-2">
                <a class="krds-btn tertiary" th:href="@{/uss/ion/msi/selectMainImageList.do}" th:text="#{button.list}">목록</a>
                <a class="krds-btn danger" th:href="@{/uss/ion/msi/removeMainImage.do(imageId=${mainImageVO.imageId})}"
                   onclick="return confirm(window.CONFIRM_DELETE || '삭제하시겠습니까?');"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></a>
            </div>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
