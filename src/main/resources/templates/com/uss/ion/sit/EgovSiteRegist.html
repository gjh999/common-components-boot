<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i3.30}">사이트 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/sit/selectSiteList.do}" th:text="#{i3.30}">사이트 관리</a></li>
        <li class="breadcrumb-item active" th:text="#{button.regist}">등록</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-window"></i> <span th:text="#{i3.30}">사이트 관리</span> - <span th:text="#{button.regist}">등록</span></h1>

    <form th:action="@{/uss/ion/sit/insertSite.do}" method="post" th:object="${siteVO}">
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i3.30}">사이트 관리</legend>
            <div class="row g-3">
                <div class="col-12"><label class="form-label"><span th:text="#{i3.31}">사이트명</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{siteNm}" maxlength="100" required/></div>
                <div class="col-12"><label class="form-label">URL <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{siteUrl}" maxlength="100" required/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{c2.1}">사이트 설명</span> <span class="frm-rq">*</span></label>
                    <textarea class="krds-input" th:field="*{siteDc}" rows="4" maxlength="1000" required></textarea></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c2.3}">주제 분류</span> <span class="frm-rq">*</span></label>
                    <select class="krds-form-select" th:field="*{siteThemaClCode}" required>
                        <option value="" th:text="#{c2.4}">선택</option>
                        <option th:each="code : ${siteThemaClCode}" th:value="${code.code}" th:text="${code.codeNm}">분류</option>
                    </select></div>
                <div class="col-md-3"><label class="form-label" th:text="#{i3.32}">활성</label>
                    <select class="krds-form-select" th:field="*{actvtyAt}">
                        <option value="Y" th:text="#{c2.5}">예</option>
                        <option value="N" th:text="#{c2.6}">아니오</option>
                    </select></div>
                <div class="col-md-3"><label class="form-label" th:text="#{i3.33}">사용</label>
                    <select class="krds-form-select" th:field="*{useAt}">
                        <option value="Y" th:text="#{c2.5}">예</option>
                        <option value="N" th:text="#{c2.6}">아니오</option>
                    </select></div>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <a class="krds-btn tertiary" th:href="@{/uss/ion/sit/selectSiteList.do}" th:text="#{button.cancel}">취소</a>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.regist}">등록</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
