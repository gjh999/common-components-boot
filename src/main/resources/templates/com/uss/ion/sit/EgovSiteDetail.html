<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i3.30}">사이트 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/sit/selectSiteList.do}" th:text="#{i3.30}">사이트 관리</a></li>
        <li class="breadcrumb-item active" th:text="${siteVO.siteNm}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-window"></i> <span th:text="${siteVO.siteNm}">사이트명</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:140px;" th:text="#{i3.31}">사이트명</th><td th:text="${siteVO.siteNm}">사이트명</td></tr>
            <tr><th scope="row">URL</th><td><a th:href="${siteVO.siteUrl}" target="_blank" rel="noopener" th:text="${siteVO.siteUrl}">url</a></td></tr>
            <tr><th scope="row" th:text="#{c2.1}">사이트 설명</th><td style="white-space:pre-wrap;" th:text="${siteVO.siteDc}">설명</td></tr>
            <tr><th scope="row" th:text="#{c2.3}">주제 분류</th><td th:text="${siteVO.siteThemaClNm}">주제분류</td></tr>
            <tr><th scope="row" th:text="#{i3.32}">활성</th><td th:text="${siteVO.actvtyAtNm}">활성</td></tr>
            <tr><th scope="row" th:text="#{i3.33}">사용</th><td th:text="${siteVO.useAtNm}">사용</td></tr>
            <tr><th scope="row" th:text="#{common.regdate}">등록일</th><td th:text="${siteVO.frstRegisterPnttm}">등록일</td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/uss/ion/sit/selectSiteList.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/uss/ion/sit/deleteSite.do}" method="post" onsubmit="return confirm('삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="siteId" th:value="${siteVO.siteId}"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/uss/ion/sit/updateSiteView.do(siteId=${siteVO.siteId})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
