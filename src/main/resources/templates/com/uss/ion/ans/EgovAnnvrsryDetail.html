<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i4.13}">기념일 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/ans/selectAnnvrsryManageList.do}" th:text="#{i4.13}">기념일 관리</a></li>
        <li class="breadcrumb-item active" th:text="${annvrsryManageVO.annvrsryNm}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-calendar-heart"></i> <span th:text="${annvrsryManageVO.annvrsryNm}">기념일명</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:140px;" th:text="#{i4.14}">기념일명</th><td th:text="${annvrsryManageVO.annvrsryNm}">기념일명</td></tr>
            <tr><th scope="row" th:text="#{i4.15}">일자</th><td th:text="${annvrsryManageVO.annvrsryTemp4}">일자</td></tr>
            <tr><th scope="row" th:text="#{c1.3}">알림설정</th><td th:text="${annvrsryManageVO.annvrsryTemp5}">ON</td></tr>
            <tr><th scope="row" th:text="#{c1.4}">메모</th><td style="white-space:pre-wrap;" th:text="${annvrsryManageVO.memo}">메모</td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/uss/ion/ans/selectAnnvrsryManageList.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/uss/ion/ans/deleteAnnvrsryManage.do}" method="post" onsubmit="return confirm(window.CONFIRM_DELETE || '삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="annId" th:value="${annvrsryManageVO.annId}"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/uss/ion/ans/selectAnnvrsryManage.do(annId=${annvrsryManageVO.annId},cmd='update')}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
