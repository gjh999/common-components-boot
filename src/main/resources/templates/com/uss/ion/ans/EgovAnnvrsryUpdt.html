<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i4.13}">기념일 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/ans/selectAnnvrsryManageList.do}" th:text="#{i4.13}">기념일 관리</a></li>
        <li class="breadcrumb-item active" th:text="#{button.modify}">수정</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-calendar-heart"></i> <span th:text="#{i4.13}">기념일 관리</span> - <span th:text="#{button.modify}">수정</span></h1>

    <form th:action="@{/uss/ion/ans/updateAnnvrsryManage.do}" method="post" th:object="${annvrsryManage}">
        <input type="hidden" th:field="*{annId}"/>
        <input type="hidden" th:field="*{usid}"/>
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i4.13}">기념일 정보</legend>
            <div class="row g-3">
                <div class="col-12"><label class="form-label"><span th:text="#{i4.14}">기념일명</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{annvrsryNm}" maxlength="255" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c1.1}">기념일구분</span> <span class="frm-rq">*</span></label>
                    <select class="krds-input" th:field="*{annvrsrySe}">
                        <option value="" th:text="#{c1.12}">선택</option>
                        <option th:each="code : ${annvrsrySeCode}" th:value="${code.code}" th:text="${code.codeNm}">구분</option>
                    </select></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i4.15}">일자</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="date" th:field="*{annvrsryDe}" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c1.2}">달력구분</span> <span class="frm-rq">*</span></label>
                    <select class="krds-input" th:field="*{cldrSe}" required>
                        <option value="1" th:text="#{c1.5}">양력</option>
                        <option value="2" th:text="#{c1.6}">음력</option>
                    </select></div>
                <div class="col-md-6"><label class="form-label" th:text="#{c1.3}">알림설정</label>
                    <select class="krds-input" th:field="*{annvrsrySetup}">
                        <option value="Y" th:text="#{c1.13}">사용</option>
                        <option value="N" th:text="#{c1.14}">미사용</option>
                    </select></div>
                <div class="col-12"><label class="form-label"><span th:text="#{c1.4}">메모</span> <span class="frm-rq">*</span></label>
                    <textarea class="krds-input" th:field="*{memo}" rows="6" maxlength="2500" required></textarea></div>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <a class="krds-btn tertiary" th:href="@{/uss/ion/ans/selectAnnvrsryManage.do(annId=${annvrsryManage.annId})}" th:text="#{button.cancel}">취소</a>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
