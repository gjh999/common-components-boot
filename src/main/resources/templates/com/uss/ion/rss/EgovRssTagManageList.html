<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title th:text="#{i1.192}">RSS 태그 관리</title>
</head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:1100px;">

    <nav aria-label="breadcrumb" class="mb-2">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/examples}" th:text="#{cat.crumb}">공통컴포넌트 예제</a></li>
            <li class="breadcrumb-item active" th:text="#{i1.192}">RSS 태그 관리</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0"><i class="bi bi-rss"></i> <span th:text="#{i1.192}">RSS 태그 관리</span></h1>
        <a class="krds-btn primary" th:href="@{/uss/ion/rss/insertRssTagManageView.do}"><i class="bi bi-plus-lg"></i> <span th:text="#{button.regist}">등록</span></a>
    </div>

    <form th:action="@{/uss/ion/rss/listRssTagManage.do}" method="get" class="search-bar krds-search mb-3">
        <div class="row g-2 align-items-end">
            <div class="col-md-3">
                <div class="form-group">
                    <div class="form-tit"><label for="searchCondition" th:text="#{i1.193}">검색구분</label></div>
                    <div class="form-conts">
                        <select id="searchCondition" name="searchCondition" class="krds-form-select">
                            <option value="A.TRGET_SVC_NM" th:selected="${searchCondition == 'A.TRGET_SVC_NM'}" th:text="#{i1.194}">대상 서비스명</option>
                            <option value="A.TRGET_SVC_TABLE" th:selected="${searchCondition == 'A.TRGET_SVC_TABLE'}" th:text="#{i1.195}">대상 테이블</option>
                            <option value="A.HDER_TITLE" th:selected="${searchCondition == 'A.HDER_TITLE'}" th:text="#{i1.196}">헤더 제목</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <div class="form-tit"><label for="searchKeyword" th:text="#{search.keyword}">검색어</label></div>
                    <div class="form-conts"><input type="text" id="searchKeyword" name="searchKeyword" class="krds-input"
                           th:value="${searchKeyword}" th:placeholder="#{search.keyword.placeholder}" placeholder="검색어를 입력하세요" maxlength="100"/></div>
                </div>
            </div>
            <div class="col-md-3">
                <button type="submit" class="krds-btn primary medium w-100"><i class="bi bi-search"></i> <span th:text="#{button.search}">검색</span></button>
            </div>
        </div>
    </form>

    <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="text-muted small"><span th:text="#{list.total}">전체</span>
            <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong>
            <span th:text="#{list.count.unit}">건</span></span>
    </div>

    <div class="krds-table-wrap">
        <table class="tbl">
            <thead>
            <tr>
                <th scope="col" style="width:70px;" th:text="#{list.seq}">순번</th>
                <th scope="col" th:text="#{i1.194}">대상 서비스명</th>
                <th scope="col" style="width:150px;" th:text="#{i1.195}">대상 테이블</th>
                <th scope="col" th:text="#{i1.196}">헤더 제목</th>
                <th scope="col" style="width:110px;" th:text="#{i1.197}">등록자</th>
                <th scope="col" style="width:120px;" th:text="#{common.regdate}">등록일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item,stat : ${resultList}">
                <td class="text-center" th:text="${stat.count}">1</td>
                <td>
                    <a th:href="@{/uss/ion/rss/detailRssTagManage.do(rssId=${item.rssId})}" th:text="${item.trgetSvcNm}">서비스명</a>
                </td>
                <td class="text-center" th:text="${item.trgetSvcTable}">테이블</td>
                <td th:text="${item.hderTitle}">헤더 제목</td>
                <td class="text-center" th:text="${item.frstRegisterId}">등록자</td>
                <td class="text-center" th:text="${item.frstRegisterPnttm}">등록일</td>
            </tr>
            <tr th:if="${resultList == null or #lists.isEmpty(resultList)}">
                <td colspan="6" class="text-center text-muted py-4" th:text="#{i1.198}">등록된 RSS 태그가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${paginationInfo != null}"
         th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/uss/ion/rss/listRssTagManage.do', searchCondition=${searchCondition}, searchKeyword=${searchKeyword})}"></div>

    <div class="text-end mt-2" sec:authorize="isAuthenticated()">
        <a class="krds-btn primary small" th:href="@{/uss/ion/rss/insertRssTagManageView.do}"><i class="bi bi-plus-lg"></i> <span th:text="#{i1.60}">등록</span></a>
    </div>

</div>
</main>
</body>
</html>
