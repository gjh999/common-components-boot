<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i1.192}">RSS 태그 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/rss/listRssTagManage.do}" th:text="#{i1.192}">RSS 태그 관리</a></li>
        <li class="breadcrumb-item active" th:text="${rssManage.trgetSvcNm}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-rss"></i> <span th:text="${rssManage.trgetSvcNm}">서비스명</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:160px;" th:text="#{i1.194}">대상 서비스명</th><td th:text="${rssManage.trgetSvcNm}">서비스명</td></tr>
            <tr><th scope="row" th:text="#{i1.195}">대상 테이블</th><td th:text="${rssManage.trgetSvcTable}">테이블</td></tr>
            <tr><th scope="row" th:text="#{c2.16}">목록 개수</th><td th:text="${rssManage.trgetSvcListCo}">개수</td></tr>
            <tr><th scope="row" th:text="#{i1.196}">헤더 제목</th><td th:text="${rssManage.hderTitle}">헤더 제목</td></tr>
            <tr><th scope="row" th:text="#{c2.17}">헤더 링크</th><td th:text="${rssManage.hderLink}">헤더 링크</td></tr>
            <tr><th scope="row" th:text="#{c2.18}">헤더 설명</th><td style="white-space:pre-wrap;" th:text="${rssManage.hderDescription}">헤더 설명</td></tr>
            <tr><th scope="row" th:text="#{c2.19}">헤더 태그</th><td th:text="${rssManage.hderTag}">헤더 태그</td></tr>
            <tr><th scope="row" th:text="#{c2.20}">헤더 기타</th><td th:text="${rssManage.hderEtc}">헤더 기타</td></tr>
            <tr><th scope="row" th:text="#{c2.21}">본문 제목</th><td th:text="${rssManage.bdtTitle}">본문 제목</td></tr>
            <tr><th scope="row" th:text="#{c2.22}">본문 링크</th><td th:text="${rssManage.bdtLink}">본문 링크</td></tr>
            <tr><th scope="row" th:text="#{c2.23}">본문 설명</th><td style="white-space:pre-wrap;" th:text="${rssManage.bdtDescription}">본문 설명</td></tr>
            <tr><th scope="row" th:text="#{c2.24}">본문 태그</th><td th:text="${rssManage.bdtTag}">본문 태그</td></tr>
            <tr><th scope="row" th:text="#{c2.25}">본문 기타</th><td th:text="${rssManage.bdtEtc}">본문 기타</td></tr>
            <tr><th scope="row" th:text="#{i1.197}">등록자</th><td th:text="${rssManage.frstRegisterId}">등록자</td></tr>
            <tr><th scope="row" th:text="#{common.regdate}">등록일</th><td th:text="${rssManage.frstRegisterPnttm}">등록일</td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/uss/ion/rss/listRssTagManage.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/uss/ion/rss/detailRssTagManage.do}" method="post" onsubmit="return confirm('삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="rssId" th:value="${rssManage.rssId}"/>
                <input type="hidden" name="cmd" value="del"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/uss/ion/rss/updtRssTagManage.do(rssId=${rssManage.rssId})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
