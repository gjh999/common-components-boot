<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title>당직 관리</title>
</head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:1000px;">

    <nav aria-label="breadcrumb" class="mb-2">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/examples}" th:text="#{cat.crumb}">공통컴포넌트 예제</a></li>
            <li class="breadcrumb-item active" th:text="#{i2.70}">당직 관리</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0"><i class="bi bi-moon-stars"></i> <span th:text="#{i2.70}">당직 관리</span></h1>
        <a class="krds-btn primary" th:href="@{/uss/ion/bnt/EgovBndtManageRegist.do}"><i class="bi bi-plus-lg"></i> <span th:text="#{button.regist}">등록</span></a>
    </div>

    <form th:action="@{/uss/ion/bnt/EgovBndtManageList.do}" method="get" class="search-bar krds-search mb-3">
        <div class="row g-2 align-items-end">
            <div class="col-md-9">
                <div class="form-group">
                    <div class="form-tit"><label for="bndtDe" th:text="#{i2.71}">당직 연월</label></div>
                    <div class="form-conts"><input type="text" id="bndtDe" name="bndtDe" class="krds-input"
                           th:value="${bndtManageVO != null ? bndtManageVO.bndtDe : ''}" th:placeholder="#{i2.72}" placeholder="YYYYMM (예: 202607)" maxlength="6"/></div>
                </div>
            </div>
            <div class="col-md-3">
                <button type="submit" class="krds-btn primary medium w-100"><i class="bi bi-search"></i> <span th:text="#{button.search}">검색</span></button>
            </div>
        </div>
    </form>

    <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="text-muted small"><span th:text="#{list.total}">전체</span>
            <strong th:text="${bndtManageList != null ? #lists.size(bndtManageList) : 0}">0</strong>
            <span th:text="#{list.count.unit}">건</span></span>
    </div>

    <div class="krds-table-wrap">
        <table class="tbl">
            <thead>
            <tr>
                <th scope="col" style="width:70px;" th:text="#{list.seq}">순번</th>
                <th scope="col" style="width:160px;" th:text="#{i2.73}">당직 일자</th>
                <th scope="col" th:text="#{i2.74}">비고</th>
                <th scope="col" style="width:120px;" th:text="#{i2.75}">일지 작성</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item,stat : ${bndtManageList}">
                <td class="text-center" th:text="${stat.count}">1</td>
                <td class="text-center"><a th:href="@{/uss/ion/bnt/EgovBndtManageDetail.do(bndtId=${item.bndtId},bndtDe=${item.bndtDe})}" th:text="${item.bndtDe}">2026-07-04</a></td>
                <td th:text="${item.remark}">비고</td>
                <td class="text-center">
                    <span class="krds-badge" th:classappend="${item.bndtTemp2 != null and item.bndtTemp2 != '0' and item.bndtTemp2 != ''} ? 'bg-success' : 'bg-gray'"
                          th:text="${item.bndtTemp2 != null and item.bndtTemp2 != '0' and item.bndtTemp2 != ''} ? '작성' : '미작성'">작성</span>
                </td>
            </tr>
            <tr th:if="${bndtManageList == null or #lists.isEmpty(bndtManageList)}">
                <td colspan="4" class="text-center text-muted py-4" th:text="#{i2.76}">등록된 당직이 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</main>
</body>
</html>
