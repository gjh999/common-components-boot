<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title th:text="#{i1.199}">휴가 관리</title>
</head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:1100px;">

    <nav aria-label="breadcrumb" class="mb-2">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/examples}" th:text="#{cat.crumb}">공통컴포넌트 예제</a></li>
            <li class="breadcrumb-item active" th:text="#{i1.199}">휴가 관리</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0"><i class="bi bi-calendar2-check"></i> <span th:text="#{i1.199}">휴가 관리</span></h1>
        <a class="krds-btn primary" th:href="@{/uss/ion/vct/EgovVcatnRegist.do}"><i class="bi bi-plus-lg"></i> <span th:text="#{button.regist}">등록</span></a>
    </div>

    <!-- 개인 연차 현황 요약 -->
    <div class="row g-2 mb-3" th:if="${vcatnManageVO != null}">
        <div class="col-md-4">
            <div class="krds-table-wrap p-3 text-center"><div class="text-muted small" th:text="#{i1.200}">발생 연차</div>
                <strong class="h5" th:text="${vcatnManageVO.occrncYrycCo} ?: '-'">15</strong> <span th:text="#{i1.201}">일</span></div>
        </div>
        <div class="col-md-4">
            <div class="krds-table-wrap p-3 text-center"><div class="text-muted small" th:text="#{i1.202}">사용 연차</div>
                <strong class="h5" th:text="${vcatnManageVO.useYrycCo} ?: '-'">3</strong> <span th:text="#{i1.201}">일</span></div>
        </div>
        <div class="col-md-4">
            <div class="krds-table-wrap p-3 text-center"><div class="text-muted small" th:text="#{i1.203}">잔여 연차</div>
                <strong class="h5 text-primary" th:text="${vcatnManageVO.remndrYrycCo} ?: '-'">12</strong> <span th:text="#{i1.201}">일</span></div>
        </div>
    </div>

    <form th:action="@{/uss/ion/vct/EgovVcatnManageList.do}" method="get" class="search-bar krds-search mb-3">
        <div class="row g-2 align-items-end">
            <div class="col-md-9">
                <div class="form-group">
                    <div class="form-tit"><label for="searchKeyword" th:text="#{search.keyword}">검색어</label></div>
                    <div class="form-conts"><input type="text" id="searchKeyword" name="searchKeyword" class="krds-input"
                           th:value="${searchKeyword}" th:placeholder="#{search.keyword.placeholder}" placeholder="시작일(YYYYMMDD) 검색" maxlength="20"/></div>
                </div>
            </div>
            <div class="col-md-3">
                <button type="submit" class="krds-btn primary medium w-100"><i class="bi bi-search"></i> <span th:text="#{button.search}">검색</span></button>
            </div>
        </div>
    </form>

    <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="text-muted small"><span th:text="#{list.total}">전체</span>
            <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong>
            <span th:text="#{list.count.unit}">건</span></span>
    </div>

    <div class="krds-table-wrap">
        <table class="tbl">
            <thead>
            <tr>
                <th scope="col" style="width:70px;" th:text="#{list.seq}">순번</th>
                <th scope="col" style="width:110px;" th:text="#{i1.204}">휴가구분</th>
                <th scope="col" style="width:200px;" th:text="#{i1.205}">기간</th>
                <th scope="col" th:text="#{i1.206}">사유</th>
                <th scope="col" style="width:100px;" th:text="#{i1.207}">결재자</th>
                <th scope="col" style="width:90px;" th:text="#{i1.51}">승인</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item,stat : ${vcatnManageList}">
                <td class="text-center" th:text="${stat.count}">1</td>
                <td class="text-center"><a th:href="@{/uss/ion/vct/EgovVcatnManageDetail.do(applcntId=${item.applcntId},vcatnSe=${item.vcatnSe},bgnde=${item.bgnde},endde=${item.endde})}" th:text="${item.vcatnSeNm}">연차</a></td>
                <td class="text-center small"><span th:text="${item.bgnde}">시작</span> ~ <span th:text="${item.endde}">종료</span></td>
                <td th:text="${item.vcatnResn}">사유</td>
                <td class="text-center" th:text="${item.sanctnerNm}">결재자</td>
                <td class="text-center">
                    <span class="krds-badge" th:classappend="${item.confmAt == 'Y'} ? 'bg-success' : 'bg-gray'"
                          th:text="${item.confmAt == 'Y'} ? #{i1.51} : #{i1.208}">승인</span>
                </td>
            </tr>
            <tr th:if="${vcatnManageList == null or #lists.isEmpty(vcatnManageList)}">
                <td colspan="6" class="text-center text-muted py-4" th:text="#{i1.209}">신청된 휴가가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${paginationInfo != null}"
         th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/uss/ion/vct/EgovVcatnManageList.do', searchCondition='', searchKeyword=${searchKeyword})}"></div>

</div>
</main>
</body>
</html>
