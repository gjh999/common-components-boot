<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i1.199}">휴가 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/vct/EgovVcatnManageList.do}" th:text="#{i1.199}">휴가 관리</a></li>
        <li class="breadcrumb-item active" th:text="#{button.regist}">등록</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-calendar2-check"></i> <span th:text="#{i1.199}">휴가 관리</span> - <span th:text="#{button.regist}">등록</span></h1>

    <div th:if="${errorMessage != null}" class="krds-alert danger mb-3" th:text="${errorMessage}">오류</div>

    <div class="row g-2 mb-3" th:if="${vcatnManageVO != null}">
        <div class="col-md-4"><div class="krds-table-wrap p-3 text-center"><div class="text-muted small" th:text="#{i1.200}">발생 연차</div>
            <strong class="h5" th:text="${vcatnManageVO.occrncYrycCo}">0</strong> <span th:text="#{i1.201}">일</span></div></div>
        <div class="col-md-4"><div class="krds-table-wrap p-3 text-center"><div class="text-muted small" th:text="#{i1.202}">사용 연차</div>
            <strong class="h5" th:text="${vcatnManageVO.useYrycCo}">0</strong> <span th:text="#{i1.201}">일</span></div></div>
        <div class="col-md-4"><div class="krds-table-wrap p-3 text-center"><div class="text-muted small" th:text="#{i1.203}">잔여 연차</div>
            <strong class="h5 text-primary" th:text="${vcatnManageVO.remndrYrycCo}">0</strong> <span th:text="#{i1.201}">일</span></div></div>
    </div>

    <form th:action="@{/uss/ion/vct/insertVcatnManage.do}" method="post" th:object="${vcatnManageVO}">
        <input type="hidden" th:field="*{applcntId}"/>
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i1.199}">휴가 관리</legend>
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label" th:text="#{i1.56}">신청자</label>
                    <input class="krds-input" type="text" th:value="*{applcntNm}" readonly/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i1.204}">휴가구분</span> <span class="frm-rq">*</span></label>
                    <select class="krds-form-select" th:field="*{vcatnSe}" required>
                        <option value="" th:text="#{i1.50}">전체</option>
                        <option th:each="code : ${vcatnSeCode}" th:value="${code.code}" th:text="${code.codeNm}">구분</option>
                    </select></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c5.9}">시작일자</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{bgnde}" maxlength="8" placeholder="YYYYMMDD" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c5.10}">종료일자</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{endde}" maxlength="8" placeholder="YYYYMMDD" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i1.207}">결재자</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{sanctnerId}" maxlength="20" required/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{i1.206}">사유</span> <span class="frm-rq">*</span></label>
                    <textarea class="krds-input" th:field="*{vcatnResn}" rows="5" maxlength="200" required></textarea></div>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <a class="krds-btn tertiary" th:href="@{/uss/ion/vct/EgovVcatnManageList.do}" th:text="#{button.cancel}">취소</a>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.regist}">등록</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
