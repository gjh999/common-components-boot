<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i1.199}">휴가 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/vct/EgovVcatnManageList.do}" th:text="#{i1.199}">휴가 관리</a></li>
        <li class="breadcrumb-item active" th:text="${vcatnManageVO.vcatnSeNm}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-calendar2-check"></i> <span th:text="#{i1.199}">휴가 관리</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:140px;" th:text="#{i1.204}">휴가구분</th><td th:text="${vcatnManageVO.vcatnSeNm}">휴가구분</td></tr>
            <tr><th scope="row" th:text="#{i1.56}">신청자</th><td th:text="${vcatnManageVO.applcntNm}">신청자</td></tr>
            <tr><th scope="row" th:text="#{i1.205}">기간</th><td><span th:text="${vcatnManageVO.bgnde}">시작</span> ~ <span th:text="${vcatnManageVO.endde}">종료</span></td></tr>
            <tr><th scope="row" th:text="#{i1.206}">사유</th><td style="white-space:pre-wrap;" th:text="${vcatnManageVO.vcatnResn}">사유</td></tr>
            <tr><th scope="row" th:text="#{i1.207}">결재자</th><td th:text="${vcatnManageVO.sanctnerNm}">결재자</td></tr>
            <tr><th scope="row" th:text="#{i1.49}">승인여부</th>
                <td><span class="krds-badge" th:classappend="${vcatnManageVO.confmAt == 'Y'} ? 'bg-success' : 'bg-gray'"
                          th:text="${vcatnManageVO.confmAt == 'Y'} ? #{i1.51} : #{i1.208}">대기</span></td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/uss/ion/vct/EgovVcatnManageList.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/uss/ion/vct/deleteVcatnManage.do}" method="post" onsubmit="return confirm(window.CONFIRM_DELETE || '삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="applcntId" th:value="${vcatnManageVO.applcntId}"/>
                <input type="hidden" name="vcatnSe" th:value="${vcatnManageVO.vcatnSe}"/>
                <input type="hidden" name="bgnde" th:value="${vcatnManageVO.bgnde}"/>
                <input type="hidden" name="endde" th:value="${vcatnManageVO.endde}"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/uss/ion/vct/EgovVcatnManageDetail.do(cmd='updt',applcntId=${vcatnManageVO.applcntId},vcatnSe=${vcatnManageVO.vcatnSe},bgnde=${vcatnManageVO.bgnde},endde=${vcatnManageVO.endde})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
