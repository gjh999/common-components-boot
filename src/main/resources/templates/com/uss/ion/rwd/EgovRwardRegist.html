<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i1.238}">포상 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/rwd/selectRwardManageList.do}" th:text="#{i1.238}">포상 관리</a></li>
        <li class="breadcrumb-item active" th:text="#{button.regist}">등록</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-award"></i> <span th:text="#{i1.238}">포상 관리</span> - <span th:text="#{button.regist}">등록</span></h1>

    <form th:action="@{/uss/ion/rwd/insertRwardManage.do}" method="post" enctype="multipart/form-data" th:object="${rwardManage}">
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i1.238}">포상 관리</legend>
            <div class="row g-3">
                <div class="col-12"><label class="form-label"><span th:text="#{i1.240}">포상명</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{rwardNm}" maxlength="255" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c5.6}">포상코드</span> <span class="frm-rq">*</span></label>
                    <select class="krds-form-select" th:field="*{rwardCd}">
                        <option value="" th:text="#{i1.50}">전체</option>
                        <option th:each="code : ${rwardCodeList}" th:value="${code.code}" th:text="${code.codeNm}">코드</option>
                    </select></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i1.239}">수상자명</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{rwardManNm}" maxlength="60" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i1.242}">포상일</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="date" th:field="*{rwardDe}" required/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{i1.207}">결재자</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{sanctnerId}" maxlength="20" required/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{c5.7}">공적내용</span> <span class="frm-rq">*</span></label>
                    <textarea class="krds-input" th:field="*{pblenCn}" rows="6" maxlength="1000" required></textarea></div>
                <div class="col-12"><label class="form-label" th:text="#{c5.8}">첨부파일</label>
                    <input class="krds-input" type="file" name="file_1"/></div>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <a class="krds-btn tertiary" th:href="@{/uss/ion/rwd/selectRwardManageList.do}" th:text="#{button.cancel}">취소</a>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.regist}">등록</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
