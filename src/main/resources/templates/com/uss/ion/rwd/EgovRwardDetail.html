<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i1.238}">포상 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/rwd/selectRwardManageList.do}" th:text="#{i1.238}">포상 관리</a></li>
        <li class="breadcrumb-item active" th:text="${rwardManageVO.rwardNm}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-award"></i> <span th:text="${rwardManageVO.rwardNm}">포상명</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:140px;" th:text="#{i1.240}">포상명</th><td th:text="${rwardManageVO.rwardNm}">포상명</td></tr>
            <tr><th scope="row" th:text="#{c5.6}">포상코드</th><td th:text="${rwardManageVO.rwardCdNm} ?: ${rwardManageVO.rwardCd}">포상코드</td></tr>
            <tr><th scope="row" th:text="#{i1.241}">수상자</th><td th:text="${rwardManageVO.rwardManNm}">수상자</td></tr>
            <tr><th scope="row" th:text="#{i1.242}">포상일</th><td th:text="${rwardManageVO.rwardDe}">포상일</td></tr>
            <tr><th scope="row" th:text="#{c5.7}">공적내용</th><td style="white-space:pre-wrap;" th:text="${rwardManageVO.pblenCn}">공적내용</td></tr>
            <tr><th scope="row" th:text="#{i1.207}">결재자</th><td th:text="${rwardManageVO.sanctnerNm}">결재자</td></tr>
            <tr><th scope="row" th:text="#{i1.49}">승인여부</th>
                <td><span class="krds-badge" th:classappend="${rwardManageVO.confmAt == 'Y'} ? 'bg-success' : 'bg-gray'"
                          th:text="${rwardManageVO.confmAt == 'Y'} ? #{i1.51} : #{i1.52}">미승인</span></td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/uss/ion/rwd/selectRwardManageList.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/uss/ion/rwd/deleteRwardManage.do}" method="post" onsubmit="return confirm('삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="rwardId" th:value="${rwardManageVO.rwardId}"/>
                <input type="hidden" name="atchFileId" th:value="${rwardManageVO.atchFileId}"/>
                <input type="hidden" name="rwardDe" th:value="${rwardManageVO.rwardDe}"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/uss/ion/rwd/EgovRwardManageDetail.do(cmd='updt',rwardId=${rwardManageVO.rwardId})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
