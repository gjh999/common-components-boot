<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i4.8}">인터넷 서비스 안내 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/isg/selectIntnetSvcGuidanceList.do}" th:text="#{i4.8}">인터넷 서비스 안내 관리</a></li>
        <li class="breadcrumb-item active" th:text="#{button.modify}">수정</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-globe2"></i> <span th:text="#{i4.8}">인터넷 서비스 안내 관리</span> - <span th:text="#{button.modify}">수정</span></h1>

    <form th:action="@{/uss/ion/isg/updtIntnetSvcGuidance.do}" method="post" th:object="${intnetSvcGuidanceVO}">
        <input type="hidden" th:field="*{intnetSvcId}"/>
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i4.9}">인터넷 서비스 안내</legend>
            <div class="row g-3">
                <div class="col-12"><label class="form-label"><span th:text="#{i4.10}">서비스명</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{intnetSvcNm}" maxlength="20" required/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{i4.11}">서비스 설명</span> <span class="frm-rq">*</span></label>
                    <textarea class="krds-input" th:field="*{intnetSvcDc}" rows="6" maxlength="200" required></textarea></div>
                <div class="col-md-6"><label class="form-label" th:text="#{i4.4}">반영여부</label>
                    <select class="krds-input" th:field="*{reflctAt}">
                        <option value="Y" th:text="#{i4.5}">반영</option>
                        <option value="N" th:text="#{i4.6}">미반영</option>
                    </select></div>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <div class="d-flex gap-2">
                <a class="krds-btn tertiary" th:href="@{/uss/ion/isg/selectIntnetSvcGuidanceList.do}" th:text="#{button.list}">목록</a>
                <a class="krds-btn danger" th:href="@{/uss/ion/isg/removeIntnetSvcGuidance.do(intnetSvcId=${intnetSvcGuidanceVO.intnetSvcId})}"
                   onclick="return confirm(window.CONFIRM_DELETE || '삭제하시겠습니까?');"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></a>
            </div>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
