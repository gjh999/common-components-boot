<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i5.11}">메모 / 할일</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:1000px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/examples}" th:text="#{cat.crumb}">공통컴포넌트 예제</a></li>
        <li class="breadcrumb-item active" th:text="#{i5.11}">메모 / 할일</li></ol></nav>
    <div class="d-flex justify-content-between align-items-center mb-3"><h1 class="h4 mb-0"><i class="bi bi-check2-square"></i> <span th:text="#{i5.11}">메모 / 할일</span></h1></div>
    <div class="d-flex justify-content-between align-items-center mb-2"><span class="text-muted small"><span th:text="#{list.total}">전체</span>
        <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong> <span th:text="#{list.count.unit}">건</span></span></div>
    <div class="krds-table-wrap"><table class="tbl">
        <thead><tr>
            <th scope="col" style="width:70px;" th:text="#{list.seq}">순번</th>
            <th scope="col" th:text="#{i5.12}">할일</th><th scope="col" style="width:160px;" th:text="#{i5.13}">시작</th>
            <th scope="col" style="width:160px;" th:text="#{i5.14}">종료</th><th scope="col" style="width:110px;" th:text="#{i5.15}">작성자</th>
        </tr></thead>
        <tbody>
        <tr th:each="item,stat : ${resultList}">
            <td class="text-center" th:text="${stat.count}">1</td>
            <td><span th:text="${item.todoNm}">할일</span><div class="small text-muted" th:text="${item.todoCn}">내용</div></td>
            <td class="text-center small" th:text="${item.todoBeginTime}">시작</td>
            <td class="text-center small" th:text="${item.todoEndTime}">종료</td>
            <td class="text-center" th:text="${item.wrterNm}">작성자</td>
        </tr>
        <tr th:if="${resultList == null or #lists.isEmpty(resultList)}"><td colspan="5" class="text-center text-muted py-4" th:text="#{i5.16}">등록된 할일이 없습니다.</td></tr>
        </tbody>
    </table></div>
</div>
</main>
</body>
</html>
