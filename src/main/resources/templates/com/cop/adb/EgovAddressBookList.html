<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i5.17}">주소록</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:1000px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/examples}" th:text="#{cat.crumb}">공통컴포넌트 예제</a></li>
        <li class="breadcrumb-item active" th:text="#{i5.17}">주소록</li></ol></nav>
    <div class="d-flex justify-content-between align-items-center mb-3"><h1 class="h4 mb-0"><i class="bi bi-journal-bookmark"></i> <span th:text="#{i5.17}">주소록</span></h1></div>
    <form th:action="@{/cop/adb/selectAdbkList.do}" method="get" class="search-bar krds-search mb-3"><div class="row g-2 align-items-end">
        <input type="hidden" name="searchCnd" value="0"/>
        <div class="col-md-9"><div class="form-group"><div class="form-tit"><label for="searchWrd" th:text="#{search.keyword}">검색어</label></div>
            <div class="form-conts"><input type="text" id="searchWrd" name="searchWrd" class="krds-input" th:value="${searchWrd}" th:placeholder="#{i5.18}" placeholder="주소록명 검색" maxlength="100"/></div></div></div>
        <div class="col-md-3"><button type="submit" class="krds-btn primary medium w-100"><i class="bi bi-search"></i> <span th:text="#{button.search}">검색</span></button></div>
    </div></form>
    <div class="d-flex justify-content-between align-items-center mb-2"><span class="text-muted small"><span th:text="#{list.total}">전체</span>
        <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong> <span th:text="#{list.count.unit}">건</span></span></div>
    <div class="krds-table-wrap"><table class="tbl">
        <thead><tr>
            <th scope="col" style="width:70px;" th:text="#{list.seq}">순번</th>
            <th scope="col" th:text="#{i5.19}">주소록명</th><th scope="col" style="width:120px;" th:text="#{i5.20}">공개범위</th>
            <th scope="col" style="width:120px;" th:text="#{i5.15}">작성자</th><th scope="col" style="width:120px;" th:text="#{i5.21}">등록일</th>
        </tr></thead>
        <tbody>
        <tr th:each="item,stat : ${resultList}">
            <td class="text-center" th:text="${stat.count}">1</td>
            <td th:text="${item.adbkNm}">주소록명</td>
            <td class="text-center"><span class="krds-badge bg-info" th:text="${item.othbcScope}">공개범위</span></td>
            <td class="text-center" th:text="${item.frstRegisterNm}">작성자</td>
            <td class="text-center small" th:text="${item.frstRegisterPnttm}">등록일</td>
        </tr>
        <tr th:if="${resultList == null or #lists.isEmpty(resultList)}"><td colspan="5" class="text-center text-muted py-4" th:text="#{i5.22}">등록된 주소록이 없습니다.</td></tr>
        </tbody>
    </table></div>
    <div th:if="${paginationInfo != null}" th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/cop/adb/selectAdbkList.do', searchCondition='0', searchKeyword=${searchWrd})}"></div>
</div>
</main>
</body>
</html>
