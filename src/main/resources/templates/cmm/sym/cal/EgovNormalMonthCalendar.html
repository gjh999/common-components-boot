<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title th:text="#{cal.normal.month.title}">일반달력 월간</title>
    <th:block layout:fragment="head-css">
    <style>
        /* 달력 균일 칸 */
        .cal-table { table-layout: fixed; width: 100%; }
        .cal-table th { padding: .6rem 0; font-size: .95rem; }
        .cal-table td.cal-day {
            height: 96px; width: 14.28%; vertical-align: top;
            text-align: left; padding: .45rem .5rem !important;
            border: 1px solid var(--t-line, rgba(255,255,255,.1));
        }
        .cal-day .d-num { font-weight: 700; font-size: .95rem; }
        .cal-day .cal-evt { display:block; margin-top:.3rem; font-size:.75rem; padding:.1rem .35rem; border-radius:6px; }
        /* 인쇄: 달력 영역만 출력 */
        @media print {
            body * { visibility: hidden; }
            #calPrintArea, #calPrintArea * { visibility: visible; }
            #calPrintArea { position: absolute; left: 0; top: 0; width: 100%; color: #000 !important; }
            #calPrintArea .cal-table td.cal-day { border: 1px solid #999 !important; height: 92px; }
            #calPrintArea .cal-evt { background: #eee !important; color: #b00 !important; -webkit-print-color-adjust: exact; }
            .no-print { display: none !important; }
        }
    </style>
    </th:block>
</head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb" class="no-print"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{cal.normal.month.title}">일반달력 월간</li>
        </ol></nav>

        <div class="d-flex align-items-center justify-content-between mb-3" th:if="${restde != null}"
             th:with="im=${#conversions.convert(restde.month, 'java.lang.Integer')}">
            <a class="krds-btn tertiary small no-print"
               th:href="@{/sym/cal/EgovNormalMonthCalendar.do(year=${restde.year}, month=${im - 1})}">
                <i class="bi bi-chevron-left"></i> <span th:text="#{cal.prevMonth}">이전달</span></a>
            <h1 class="h4 mb-0"><i class="bi bi-calendar-month"></i>
                <span th:text="${restde.year}">2026</span><span th:text="#{cal.year}">년</span> <span th:text="${restde.month}">6</span><span th:text="#{cal.month}">월</span> <span th:text="#{cal.normal.month.heading}">일반달력</span></h1>
            <div class="d-flex gap-2 no-print">
                <button type="button" class="krds-btn secondary small" onclick="window.print()"><i class="bi bi-printer"></i> 인쇄</button>
                <a class="krds-btn tertiary small"
                   th:href="@{/sym/cal/EgovNormalMonthCalendar.do(year=${restde.year}, month=${im + 1})}">
                    <span th:text="#{cal.nextMonth}">다음달</span> <i class="bi bi-chevron-right"></i></a>
            </div>
        </div>

        <div id="calPrintArea">
        <table class="tbl cal-table text-center" th:if="${restde != null}">
            <thead>
            <tr><th class="text-danger" th:text="#{cal.weekday.sun}">일</th><th th:text="#{cal.weekday.mon}">월</th><th th:text="#{cal.weekday.tue}">화</th><th th:text="#{cal.weekday.wed}">수</th><th th:text="#{cal.weekday.thu}">목</th><th th:text="#{cal.weekday.fri}">금</th><th class="text-primary" th:text="#{cal.weekday.sat}">토</th></tr>
            </thead>
            <tbody>
            <tr th:each="r : ${#numbers.sequence(0, 5)}">
                <td class="cal-day" th:each="c : ${#numbers.sequence(0, 6)}"
                    th:with="dd=${r * 7 + c + 2 - restde.startWeekMonth}, dstr=${(dd lt 10 ? '0' : '') + dd}"
                    th:classappend="${c == 0} ? ' text-danger' : (${c == 6} ? ' text-primary' : '')">
                    <th:block th:if="${dd ge 1 and dd le restde.lastDayMonth}">
                        <span class="d-num" th:text="${dd}"></span>
                        <span class="cal-evt krds-badge bg-danger"
                              th:each="rd : ${RestdeList}" th:if="${rd.day == dstr}"
                              th:text="${rd.restdeNm}"></span>
                    </th:block>
                </td>
            </tr>
            </tbody>
        </table>
        </div>
        <div th:if="${restde == null}" class="alert alert-secondary" th:text="#{cal.noCalData}">표시할 달력 데이터가 없습니다.</div>

        <h2 class="h6 mt-4 no-print" th:text="#{cal.holidayList}">휴일 목록</h2>
        <ul class="list-group no-print">
            <li class="list-group-item d-flex justify-content-between" th:each="rd : ${RestdeList}">
                <span th:text="${rd.restdeDe}">일자</span>
                <span th:text="${rd.restdeNm}">휴일명</span>
            </li>
            <li class="list-group-item text-muted text-center" th:if="${RestdeList == null or #lists.isEmpty(RestdeList)}" th:text="#{cal.noHoliday}">휴일이 없습니다.</li>
        </ul>
    </div>
</main>
</body>
</html>
