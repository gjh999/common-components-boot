<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="${stubTitle}">데모</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:1050px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/examples}" th:text="#{cat.crumb}">공통컴포넌트 예제</a></li>
        <li class="breadcrumb-item active" th:text="${stubTitle}">데모</li></ol></nav>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0"><i class="bi" th:classappend="${stubIcon}"></i> <span th:text="${stubTitle}">데모</span></h1>
        <span th:unless="${simple}" class="krds-badge" style="background:rgba(255,159,67,.2); color:#ff9f43; font-weight:700;" th:text="#{i4.35}">더미데이터 시연</span>
        <span th:if="${simple}" class="krds-badge" style="background:rgba(79,107,255,.2); color:#9ab4ff; font-weight:700;" th:text="#{i4.36}">간이 구현</span>
    </div>

    <!-- 간이 구현 안내(실데이터, 고급기능 일부 생략) -->
    <div th:if="${simple}" style="border:1px solid rgba(79,107,255,.35); background:rgba(79,107,255,.08); border-radius:12px; padding:.85rem 1.1rem; margin-bottom:1.3rem; font-size:.9rem;">
        <i class="bi bi-info-circle"></i> <span th:text="${dummyReason}">간이 구현 안내</span>
    </div>

    <!-- 더미데이터 안내 배너 -->
    <div th:unless="${simple}" style="border:1px solid rgba(255,159,67,.4); background:rgba(255,159,67,.08); border-radius:12px; padding:1rem 1.2rem; margin-bottom:1.3rem;">
        <div style="font-weight:700; margin-bottom:.35rem;"><i class="bi bi-exclamation-triangle"></i> <span th:text="#{i4.37}">이 화면은 더미데이터로 시연됩니다</span></div>
        <div style="font-size:.9rem; color:var(--t-muted,#aab1d6); line-height:1.6;" th:text="${dummyReason}">사유</div>
        <div style="font-size:.86rem; margin-top:.5rem; padding-top:.5rem; border-top:1px dashed rgba(255,255,255,.12);">
            <strong style="color:#9ab4ff;" th:text="#{i4.38}">실제 구현 방법:</strong> <span th:text="${dummyHowto}">방법</span>
        </div>
    </div>

    <!-- 정보형(테이블 없음: 라이브러리 연동 컴포넌트) -->
    <div th:if="${infoOnly}" class="krds-table-wrap" style="padding:1.4rem 1.5rem;">
        <div style="font-weight:700; margin-bottom:.6rem;"><i class="bi bi-diagram-2"></i> <span th:text="#{i4.39}">동작 방식</span></div>
        <ul style="line-height:1.9; margin:0; padding-left:1.1rem;">
            <li th:each="note : ${notes}" th:text="${note}">설명</li>
        </ul>
    </div>

    <div th:unless="${infoOnly}" class="d-flex justify-content-between align-items-center mb-2">
        <span class="text-muted small"><span th:text="#{list.total}">전체</span>
            <strong th:text="${rows != null ? #lists.size(rows) : 0}">0</strong> <span th:text="#{list.count.unit}">건</span>
            <span class="text-muted" th:text="#{i4.40}">(더미)</span></span>
    </div>

    <div th:unless="${infoOnly}" class="krds-table-wrap"><table class="tbl">
        <thead><tr>
            <th scope="col" style="width:70px;" th:text="#{list.seq}">순번</th>
            <th scope="col" th:each="c : ${cols}" th:text="${c[1]}">컬럼</th>
        </tr></thead>
        <tbody>
        <tr th:each="row,stat : ${rows}">
            <td class="text-center" th:text="${stat.count}">1</td>
            <td th:each="c : ${cols}" th:text="${row.get(c[0])}">값</td>
        </tr>
        <tr th:if="${rows == null or #lists.isEmpty(rows)}">
            <td th:attr="colspan=${cols != null ? #lists.size(cols) + 1 : 2}" class="text-center text-muted py-4" th:text="#{i4.41}">더미데이터가 없습니다.</td>
        </tr>
        </tbody>
    </table></div>

    <div class="mt-3">
        <a th:href="@{/examples/guide}" class="krds-btn secondary small"><i class="bi bi-info-circle"></i> <span th:text="#{i4.42}">구현 가이드 전체 보기</span></a>
    </div>
</div>
</main>
</body>
</html>
