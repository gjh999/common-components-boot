<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<body>
<header th:fragment="header" class="egov-header">
    <div class="container d-flex align-items-center justify-content-between py-2">
        <a class="d-flex align-items-center text-decoration-none" th:href="@{/}">
            <img th:src="@{/images/logo.svg}" th:alt="#{header.logo.alt}" alt="로고" width="36" height="36" class="me-2"/>
            <span class="fw-bold egov-brand-title" th:text="#{header.brand}">전자정부 표준프레임워크 기업업무</span>
        </a>
        <div class="d-flex align-items-center gap-2">
            <!-- 언어 선택 -->
            <div class="egov-lang" role="group" th:attr="aria-label=#{lang.select}" aria-label="언어 선택">
                <a th:href="@{/cmm/lang(lang='ko')}" class="lang-btn" th:classappend="${#locale.language == 'ko'} ? 'active'" th:text="#{lang.korean.short}">한국어</a>
                <a th:href="@{/cmm/lang(lang='en')}" class="lang-btn" th:classappend="${#locale.language == 'en'} ? 'active'">EN</a>
            </div>
            <span sec:authorize="isAuthenticated()" class="me-2" th:with="se=${session.loginVO != null} ? ${session.loginVO.userSe} : ''">
                <i class="bi bi-person-circle"></i>
                <!-- 사용자 구분(업무사용자/일반회원/기업회원) 배지 -->
                <span class="krds-badge" th:if="${se != null and !se.isEmpty()}"
                      th:text="${se == 'USR'} ? #{login.userSe.usr} : (${se == 'GNR'} ? #{login.userSe.gnr} : (${se == 'ENT'} ? #{login.userSe.ent} : ''))">구분</span>
                <span sec:authentication="principal.username">사용자</span> <span th:text="#{header.user.suffix}">님</span>
            </span>
            <!-- 본인 정보수정(마이페이지) — 로그인한 모든 사용자 -->
            <a sec:authorize="isAuthenticated()"
               class="krds-btn tertiary small" th:href="@{/uss/umt/mypage.do}">
                <i class="bi bi-person-gear"></i> <span th:text="#{common.mypage}">내 정보수정</span>
            </a>
            <a sec:authorize="isAuthenticated() and hasRole('ADMIN')"
               class="krds-btn tertiary small" th:href="@{/uss/umt/mber/EgovMberManage.do}">
                <i class="bi bi-people"></i> <span th:text="#{common.memberManage}">회원관리</span>
            </a>
            <a sec:authorize="!isAuthenticated()" class="krds-btn primary small"
               th:href="@{/uat/uia/egovLoginUsr.do}"><i class="bi bi-box-arrow-in-right"></i> <span th:text="#{common.login}">로그인</span></a>
            <a sec:authorize="isAuthenticated()" class="krds-btn danger small"
               th:href="@{/uat/uia/actionLogout.do}"><i class="bi bi-box-arrow-right"></i> <span th:text="#{common.logout}">로그아웃</span></a>
        </div>
    </div>
</header>
</body>
</html>
