<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i2.58}">팝업창 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/pwm/listPopup.do}" th:text="#{i2.58}">팝업창 관리</a></li>
        <li class="breadcrumb-item active" th:text="#{button.regist}">등록</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-window-stack"></i> <span th:text="#{i2.58}">팝업창 관리</span> - <span th:text="#{button.regist}">등록</span></h1>

    <form th:action="@{/uss/ion/pwm/registPopup.do}" method="post" th:object="${popupManageVO}">
        <input type="hidden" name="cmd" value="save"/>
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{i2.59}">팝업 제목</legend>
            <div class="row g-3">
                <div class="col-12"><label class="form-label"><span th:text="#{i2.59}">팝업 제목</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{popupTitleNm}" maxlength="100" required/></div>
                <div class="col-12"><label class="form-label"><span th:text="#{c7.1}">팝업 URL</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="text" th:field="*{fileUrl}" maxlength="255" placeholder="https://..." required/></div>
            </div>
        </fieldset>
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{c7.8}">위치·크기(px)</legend>
            <div class="row g-3">
                <div class="col-md-3"><label class="form-label"><span th:text="#{c7.2}">가로 위치</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="number" th:field="*{popupWlc}" required/></div>
                <div class="col-md-3"><label class="form-label"><span th:text="#{c7.3}">세로 위치</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="number" th:field="*{popupHlc}" required/></div>
                <div class="col-md-3"><label class="form-label"><span th:text="#{c7.4}">너비</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="number" th:field="*{popupWSize}" required/></div>
                <div class="col-md-3"><label class="form-label"><span th:text="#{c7.5}">높이</span> <span class="frm-rq">*</span></label>
                    <input class="krds-input" type="number" th:field="*{popupHSize}" required/></div>
            </div>
        </fieldset>
        <fieldset class="krds-form-section">
            <legend class="krds-form-section-title" th:text="#{c7.9}">게시 기간</legend>
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label" th:text="#{i2.60}">게시 시작일</label>
                    <input class="krds-input" type="date" th:field="*{ntceBgnde}"/></div>
                <div class="col-md-6"><label class="form-label" th:text="#{i2.61}">게시 종료일</label>
                    <input class="krds-input" type="date" th:field="*{ntceEndde}"/></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c7.6}">공지 여부</span> <span class="frm-rq">*</span></label>
                    <select class="krds-form-select" th:field="*{ntceAt}" required>
                        <option value="Y" th:text="#{c2.5}">예</option><option value="N" th:text="#{c2.6}">아니오</option></select></div>
                <div class="col-md-6"><label class="form-label"><span th:text="#{c7.7}">그만보기 사용</span> <span class="frm-rq">*</span></label>
                    <select class="krds-form-select" th:field="*{stopVewAt}" required>
                        <option value="Y" th:text="#{c2.5}">예</option><option value="N" th:text="#{c2.6}">아니오</option></select></div>
            </div>
        </fieldset>
        <div class="form-actions d-flex justify-content-between align-items-center">
            <a class="krds-btn tertiary" th:href="@{/uss/ion/pwm/listPopup.do}" th:text="#{button.cancel}">취소</a>
            <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.regist}">등록</span></button>
        </div>
    </form>
</div>
</main>
</body>
</html>
