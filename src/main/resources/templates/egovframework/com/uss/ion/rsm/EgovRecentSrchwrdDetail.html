<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i3.35}">최근 검색어 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/rsm/listRecentSrchwrd.do}" th:text="#{i3.35}">최근 검색어 관리</a></li>
        <li class="breadcrumb-item active" th:text="${recentSrchwrd.srchwrdManageNm}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-search-heart"></i> <span th:text="${recentSrchwrd.srchwrdManageNm}">검색어 관리명</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:160px;" th:text="#{i3.36}">검색어 관리명</th><td th:text="${recentSrchwrd.srchwrdManageNm}">관리명</td></tr>
            <tr><th scope="row" th:text="#{i3.37}">연계 URL</th><td th:text="${recentSrchwrd.srchwrdManageUrl}">URL</td></tr>
            <tr><th scope="row" th:text="#{i3.38}">사용자검색</th><td th:text="${recentSrchwrd.srchwrdManageUseYn == 'Y'} ? #{i3.39} : #{i3.40}">허용</td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/uss/ion/rsm/listRecentSrchwrd.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/uss/ion/rsm/detailRecentSrchwrd.do}" method="post" onsubmit="return confirm('삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="cmd" value="del"/>
                <input type="hidden" name="srchwrdManageId" th:value="${recentSrchwrd.srchwrdManageId}"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/uss/ion/rsm/updtRecentSrchwrdView.do(srchwrdManageId=${recentSrchwrd.srchwrdManageId})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
