<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i4.49}">통합 링크 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/ion/ulm/listUnityLink.do}" th:text="#{i4.49}">통합 링크 관리</a></li>
        <li class="breadcrumb-item active" th:text="${unityLink.unityLinkNm}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-link-45deg"></i> <span th:text="${unityLink.unityLinkNm}">링크명</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:140px;" th:text="#{i4.50}">링크명</th><td th:text="${unityLink.unityLinkNm}">링크명</td></tr>
            <tr><th scope="row" th:text="#{c2.15}">링크 구분</th><td th:text="${unityLink.unityLinkSeCode}">구분</td></tr>
            <tr><th scope="row">URL</th><td><a th:href="${unityLink.unityLinkUrl}" target="_blank" rel="noopener" th:text="${unityLink.unityLinkUrl}">url</a></td></tr>
            <tr><th scope="row" th:text="#{i4.3}">설명</th><td style="white-space:pre-wrap;" th:text="${unityLink.unityLinkDc}">설명</td></tr>
            <tr><th scope="row" th:text="#{common.regdate}">등록일</th><td th:text="${unityLink.frstRegisterPnttm}">등록일</td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/uss/ion/ulm/listUnityLink.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/uss/ion/ulm/detailUnityLink.do}" method="post" onsubmit="return confirm('삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="unityLinkId" th:value="${unityLink.unityLinkId}"/>
                <input type="hidden" name="cmd" value="del"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/uss/ion/ulm/updtUnityLinkView.do(unityLinkId=${unityLink.unityLinkId})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
