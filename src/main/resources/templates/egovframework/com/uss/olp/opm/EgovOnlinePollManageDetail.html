<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{i2.40}">온라인 투표 관리</title></head>
<body>
<main layout:fragment="content">
<div class="container" style="max-width:820px;">
    <nav aria-label="breadcrumb" class="mb-2"><ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{menu.home}">홈</a></li>
        <li class="breadcrumb-item"><a th:href="@{/uss/olp/opm/listOnlinePollManage.do}" th:text="#{i2.40}">온라인 투표 관리</a></li>
        <li class="breadcrumb-item active" th:text="${onlinePollManage.pollNm}">상세</li>
    </ol></nav>
    <h1 class="h4 mb-3"><i class="bi bi-bar-chart-line"></i> <span th:text="${onlinePollManage.pollNm}">투표명</span></h1>

    <div class="krds-table-wrap">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:160px;" th:text="#{i2.42}">투표명</th><td th:text="${onlinePollManage.pollNm}">투표명</td></tr>
            <tr><th scope="row" th:text="#{i2.43}">투표 기간</th><td><span th:text="${onlinePollManage.pollBeginDe}">시작</span> ~ <span th:text="${onlinePollManage.pollEndDe}">종료</span></td></tr>
            <tr><th scope="row" th:text="#{c4.3}">투표 종류</th><td>
                <span th:each="c : ${pollKindCodeList}" th:if="${c.code == onlinePollManage.pollKindCode}" th:text="${c.codeNm}">종류</span>
            </td></tr>
            <tr><th scope="row" th:text="#{c4.4}">폐기 여부</th><td th:text="${onlinePollManage.pollDsuseYn == 'N'} ? #{c4.6} : #{c4.7}">여부</td></tr>
            <tr><th scope="row" th:text="#{c4.5}">자동 폐기</th><td th:text="${onlinePollManage.pollAutoDsuseYn == 'Y'} ? #{c4.8} : #{c4.9}">여부</td></tr>
            </tbody>
        </table>
    </div>

    <div class="form-actions d-flex justify-content-between align-items-center">
        <a class="krds-btn tertiary" th:href="@{/uss/olp/opm/listOnlinePollManage.do}" th:text="#{button.list}">목록</a>
        <div class="d-flex gap-2">
            <form th:action="@{/uss/olp/opm/detailOnlinePollManage.do}" method="post" onsubmit="return confirm('삭제하시겠습니까?');" style="display:inline;">
                <input type="hidden" name="pollId" th:value="${onlinePollManage.pollId}"/>
                <input type="hidden" name="cmd" value="del"/>
                <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
            </form>
            <a class="krds-btn primary" th:href="@{/uss/olp/opm/updtOnlinePollManageView.do(pollId=${onlinePollManage.pollId})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
        </div>
    </div>
</div>
</main>
</body>
</html>
